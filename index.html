<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Global City Cup</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#3b36b6,#000);
color:white;
text-align:center;
}

h1{
margin-top:40px;
letter-spacing:4px;
}

.wrapper{
overflow-x:auto;
padding:60px;
}

.bracket{
display:grid;
grid-template-columns:
220px 220px 220px 220px 200px 220px 220px 220px 220px;
gap:30px;
align-items:center;
min-width:1400px;
}

/* MATCH BOX */

.match{
background:linear-gradient(90deg,#eee,#bbb);
border-radius:40px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
color:black;
font-weight:bold;
}

/* SPACING */

.r32 .match{margin:25px 0;}
.r16 .match{margin:70px 0;}
.qf .match{margin:140px 0;}
.sf .match{margin:220px 0;}

.final{
margin-top:200px;
}

</style>
</head>

<body>

<h1>GLOBAL CITY CUP</h1>

<div class="wrapper">

<div class="bracket">

<!-- LEFT R32 -->
<div class="round r32">
<div class="match">Tokyo</div>
<div class="match">London</div>
<div class="match">Madrid</div>
<div class="match">Rome</div>
<div class="match">Amsterdam</div>
<div class="match">Vienna</div>
<div class="match">Budapest</div>
<div class="match">Athens</div>
</div>

<!-- LEFT R16 -->
<div class="round r16">
<div class="match">Winner</div>
<div class="match">Winner</div>
<div class="match">Winner</div>
<div class="match">Winner</div>
</div>

<!-- LEFT QF -->
<div class="round qf">
<div class="match">Winner</div>
<div class="match">Winner</div>
</div>

<!-- LEFT SF -->
<div class="round sf">
<div class="match">Winner</div>
</div>

<!-- FINAL -->
<div class="round final">
<div class="match">CHAMPION</div>
</div>

<!-- RIGHT SF -->
<div class="round sf">
<div class="match">Winner</div>
</div>

<!-- RIGHT QF -->
<div class="round qf">
<div class="match">Winner</div>
<div class="match">Winner</div>
</div>

<!-- RIGHT R16 -->
<div class="round r16">
<div class="match">Winner</div>
<div class="match">Winner</div>
<div class="match">Winner</div>
<div class="match">Winner</div>
</div>

<!-- RIGHT R32 -->
<div class="round r32">
<div class="match">Sydney</div>
<div class="match">Toronto</div>
<div class="match">Seoul</div>
<div class="match">Singapore</div>
<div class="match">Dubai</div>
<div class="match">Bangkok</div>
<div class="match">Shanghai</div>
<div class="match">Hong Kong</div>
</div>

</div>

</div>

</body>
</html>
