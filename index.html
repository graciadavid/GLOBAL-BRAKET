<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Champions Votes</title>
  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(180deg,#3c3ccf 0%, #111 100%);
      color:white;
      min-height:100vh;
    }

    .page{
      max-width:1100px;
      margin:0 auto;
      padding:40px 20px 60px;
    }

    h1{
      text-align:center;
      font-size:48px;
      margin:0 0 10px;
      font-weight:300;
      letter-spacing:1px;
    }

    .subtitle{
      text-align:center;
      color:#d8d8ff;
      margin-bottom:40px;
      font-size:18px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(240px, 1fr));
      gap:20px;
    }

    .card{
      background:rgba(255,255,255,0.1);
      border:1px solid rgba(255,255,255,0.18);
      border-radius:18px;
      padding:24px;
      backdrop-filter:blur(8px);
      cursor:pointer;
      transition:transform .15s ease, background .15s ease;
    }

    .card:hover{
      transform:translateY(-4px);
      background:rgba(255,255,255,0.16);
    }

    .card h2{
      margin:0 0 10px;
      font-size:26px;
      font-weight:700;
    }

    .card p{
      margin:0;
      color:#e9e9ff;
      line-height:1.4;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>CHAMPIONS VOTES</h1>
    <div class="subtitle">Choose a competition</div>

    <div class="grid">
      <div class="card" onclick="openBracket('names')">
        <h2>Best Male Name</h2>
        <p>32 names. Full bracket. Click to open the tournament.</p>
      </div>

      <div class="card" onclick="openBracket('female-names')">
        <h2>Best Female Name</h2>
        <p>Another 32-player bracket.</p>
      </div>

      <div class="card" onclick="openBracket('cities')">
        <h2>Best City</h2>
        <p>Cities compete in direct elimination duels.</p>
      </div>
    </div>
  </div>

  <script>
    function openBracket(competition){
      window.location.href = "bracket.html?competition=" + encodeURIComponent(competition);
    }
  </script>
</body>
</html>
