<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Global City Cup</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bracketry/dist/bracketry.css">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#3a36b0,#000);
color:white;
text-align:center;
}

h1{
margin-top:40px;
letter-spacing:3px;
}

#bracket{
width:100%;
max-width:1200px;
margin:40px auto;
}

</style>

</head>

<body>

<h1>GLOBAL CITY CUP</h1>

<div id="bracket"></div>

<script src="https://cdn.jsdelivr.net/npm/bracketry/dist/bracketry.min.js"></script>

<script>

const data = {
  rounds: [
    {
      matches: [
        { players: ["Tokyo", "London"] },
        { players: ["Madrid", "Rome"] },
        { players: ["Amsterdam", "Vienna"] },
        { players: ["Budapest", "Athens"] },
        { players: ["Sydney", "Toronto"] },
        { players: ["Seoul", "Singapore"] },
        { players: ["Dubai", "Bangkok"] },
        { players: ["Shanghai", "Hong Kong"] }
      ]
    }
  ]
};

Bracketry.render({
  element: document.getElementById("bracket"),
  data: data
});

</script>

</body>
</html>
