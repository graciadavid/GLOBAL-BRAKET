<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Global City Cup</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0a1c3d;
color:white;
text-align:center;
}

h1{
margin:20px;
letter-spacing:3px;
}

.wrapper{
overflow-x:auto;
padding:40px;
}

.bracket{
display:flex;
align-items:center;
gap:70px;
min-width:1100px;
}

/* RONDAS */

.round{
display:flex;
flex-direction:column;
gap:50px;
}

/* PARTIDOS */

.match{
background:#1c2f5e;
padding:10px;
border-radius:8px;
width:170px;
}

.team{
display:flex;
justify-content:space-between;
margin:5px 0;
}

button{
background:#00e7b2;
border:none;
border-radius:4px;
padding:3px 8px;
cursor:pointer;
}

/* CENTRO */

.center{
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
}

.trophy{
font-size:70px;
}

.final{
background:#00e7b2;
color:black;
padding:12px 22px;
border-radius:10px;
font-weight:bold;
}

</style>

</head>

<body>

<h1>GLOBAL CITY CUP</h1>

<div class="wrapper">

<div class="bracket">

<!-- LEFT R16 -->

<div class="round">

<div class="match">
<div class="team">Tokyo <button>Vote</button></div>
<div class="team">New York <button>Vote</button></div>
</div>

<div class="match">
<div class="team">London <button>Vote</button></div>
<div class="team">Paris <button>Vote</button></div>
</div>

<div class="match">
<div class="team">Madrid <button>Vote</button></div>
<div class="team">Barcelona <button>Vote</button></div>
</div>

<div class="match">
<div class="team">Rome <button>Vote</button></div>
<div class="team">Berlin <button>Vote</button></div>
</div>

</div>


<!-- LEFT QUARTER -->

<div class="round">

<div class="match">Winner</div>
<div class="match">Winner</div>

</div>


<!-- LEFT SEMI -->

<div class="round">

<div class="match">Winner</div>

</div>


<!-- CENTER -->

<div class="center">

<div class="trophy">🏆</div>

<div class="final">FINAL</div>

</div>


<!-- RIGHT SEMI -->

<div class="round">

<div class="match">Winner</div>

</div>


<!-- RIGHT QUARTER -->

<div class="round">

<div class="match">Winner</div>
<div class="match">Winner</div>

</div>


<!-- RIGHT R16 -->

<div class="round">

<div class="match">
<div class="team">Sydney <button>Vote</button></div>
<div class="team">Melbourne <button>Vote</button></div>
</div>

<div class="match">
<div class="team">Toronto <button>Vote</button></div>
<div class="team">Vancouver <button>Vote</button></div>
</div>

<div class="match">
<div class="team">Seoul <button>Vote</button></div>
<div class="team">Shanghai <button>Vote</button></div>
</div>

<div class="match">
<div class="team">Singapore <button>Vote</button></div>
<div class="team">Bangkok <button>Vote</button></div>
</div>

</div>

</div>

</div>

</body>
</html>
