<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Best Male Name</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:40px;
border-radius:10px;
text-align:center;
width:400px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
margin-bottom:30px;
}

.name{
font-size:28px;
margin:20px 0;
}

button{
width:100%;
padding:15px;
margin:10px 0;
font-size:18px;
cursor:pointer;
border:none;
border-radius:8px;
background:#0070f3;
color:white;
}

button:hover{
background:#005ad1;
}

.progress{
margin-top:20px;
color:#777;
}

</style>

</head>

<body>

<div class="container">

<h1>Who do you prefer?</h1>

<div id="name1" class="name"></div>

<div>VS</div>

<div id="name2" class="name"></div>

<button onclick="vote(1)">Vote</button>
<button onclick="vote(2)">Vote</button>

<div class="progress" id="progress"></div>

</div>

<script>

const names = [
"Alejandro","Daniel","Mateo","Lucas",
"Hugo","Adrián","Pablo","Bruno",
"Diego","Javier","Carlos","Álvaro",
"Marco","Nicolás","Iván","Sergio",
"Gabriel","Leo","Mario","Andrés",
"David","Eric","Oscar","Raúl",
"Martín","Joel","Samuel","Enzo",
"Tomás","Gonzalo","Luis","Rubén"
];

let matches = [];
let currentMatch = 0;

for(let i=0;i<names.length;i+=2){
matches.push([names[i],names[i+1]]);
}

function loadMatch(){

if(currentMatch >= matches.length){
document.querySelector(".container").innerHTML="<h1>Round finished!</h1>";
return;
}

document.getElementById("name1").innerText = matches[currentMatch][0];
document.getElementById("name2").innerText = matches[currentMatch][1];

document.getElementById("progress").innerText =
"Match " + (currentMatch+1) + " of " + matches.length;

}

function vote(choice){

currentMatch++;

loadMatch();

}

loadMatch();

</script>

</body>
</html>
