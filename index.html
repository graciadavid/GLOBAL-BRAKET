<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Global Bracket</title>

<style>

body{
background:#0c1a3a;
font-family:Arial;
color:white;
text-align:center;
}

h1{
margin:20px;
letter-spacing:2px;
}

.bracket{
display:flex;
justify-content:center;
align-items:center;
gap:40px;
margin-top:40px;
}

/* COLUMNAS */

.column{
display:flex;
flex-direction:column;
gap:40px;
}

/* PARTIDOS */

.match{
background:#162b5c;
padding:10px;
border-radius:6px;
width:180px;
position:relative;
}

.team{
display:flex;
justify-content:space-between;
padding:4px;
}

/* BOTONES */

button{
background:#00ffc8;
border:none;
border-radius:4px;
padding:2px 6px;
cursor:pointer;
font-size:12px;
}

/* CONECTORES */

.match::after{
content:"";
position:absolute;
right:-20px;
top:50%;
width:20px;
height:2px;
background:white;
}

.column.mid .match::after{
display:none;
}

/* CENTRO */

.center{
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
}

.trophy{
font-size:80px;
}

.final{
background:#00ffc8;
color:black;
padding:12px 20px;
border-radius:10px;
font-weight:bold;
}

</style>

</head>

<body>

<h1>GLOBAL CITY CUP</h1>

<div class="bracket">

<!-- LEFT SIDE -->

<div class="column">

<div class="match">
<div class="team">Tokyo <button>Vote</button></div>
<div class="team">New York <button>Vote</button></div>
</div>

<div class="match">
<div class="team">London <button>Vote</button></div>
<div class="team">Paris <button>Vote</button></div>
</div>

<div class="match">
<div class="team">Madrid <button>Vote</button></div>
<div class="team">Barcelona <button>Vote</button></div>
</div>

<div class="match">
<div class="team">Rome <button>Vote</button></div>
<div class="team">Berlin <button>Vote</button></div>
</div>

</div>


<div class="column">

<div class="match">Winner</div>
<div class="match">Winner</div>

</div>


<div class="column">

<div class="match">Winner</div>

</div>


<!-- CENTER -->

<div class="center">

<div class="trophy">🏆</div>

<div class="final">
FINAL
</div>

</div>


<!-- RIGHT SIDE -->

<div class="column mid">

<div class="match">
<div class="team">Sydney <button>Vote</button></div>
<div class="team">Melbourne <button>Vote</button></div>
</div>

<div class="match">
<div class="team">Toronto <button>Vote</button></div>
<div class="team">Vancouver <button>Vote</button></div>
</div>

<div class="match">
<div class="team">Seoul <button>Vote</button></div>
<div class="team">Shanghai <button>Vote</button></div>
</div>

<div class="match">
<div class="team">Singapore <button>Vote</button></div>
<div class="team">Bangkok <button>Vote</button></div>
</div>

</div>


<div class="column mid">

<div class="match">Winner</div>
<div class="match">Winner</div>

</div>


<div class="column mid">

<div class="match">Winner</div>

</div>

</div>

</body>
</html>
