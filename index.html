<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseClient = window.supabase.createClient(
"https://okaprbdbtnyiutztibcs.supabase.co",
"TU_ANON_KEY"
)

function openOct(match){

const cutoff=new Date()
cutoff.setHours(19,5,0,0)

if(new Date()>=cutoff){
alert("Round of 16 closed")
return
}

window.location.href="/duel.html?match="+match
}

async function update(){

const {data}=await supabaseClient.from("votes").select("*")

if(!data)return

function count(match,team){

let v=0

data.forEach(x=>{
if(x.match===match && x.choice===team)v++
})

return v
}

function percent(a,b){

let t=a+b

if(t===0){
a=1
b=1
t=2
}

return[
Math.round(a/t*100),
Math.round(b/t*100)
]

}

const matches={
"madrid-barcelona":["madrid","barcelona"],
"paris-rome":["paris","rome"],
"london-berlin":["london","berlin"],
"lisbon-amsterdam":["lisbon","amsterdam"],
"prague-vienna":["prague","vienna"],
"budapest-dublin":["budapest","dublin"],
"copenhagen-florence":["copenhagen","florence"],
"seville-milan":["seville","milan"]
}

Object.keys(matches).forEach(m=>{

let[a,b]=matches[m]

let va=count(m,a)
let vb=count(m,b)

let[pA,pB]=percent(va,vb)

document.getElementById(a).innerText=pA+"%"
document.getElementById(b).innerText=pB+"%"

})

}

update()
setInterval(update,2000)

</script>
