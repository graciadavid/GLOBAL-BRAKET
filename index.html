<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseClient = window.supabase.createClient(
"https://okaprbdbtnyiutztibcs.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rYXByYmRidG55aXV0enRpYmNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMDgyNjgsImV4cCI6MjA4ODg4NDI2OH0.8tfmypajrsLVbrD3-PUwkJvrM1h9aQ8UN2IP3btoNLE"
)

function openDuel(slug){
window.location.href="/duel.html?match="+slug
}

function cutoffPassed(){
const cutoff = new Date()
cutoff.setHours(19,5,0,0)
return new Date()>=cutoff
}

function winner(data,match,a,b){

let votesA=0
let votesB=0

data.forEach(v=>{
if(v.match===match){
if(v.choice===a) votesA++
if(v.choice===b) votesB++
}
})

if(votesA===0 && votesB===0){
votesA=1
votesB=1
}

return votesA>=votesB?a:b
}

async function updateBracket(){

const { data } = await supabaseClient
.from("votes")
.select("*")

if(!data) return

const matches={
"madrid-barcelona":["madrid","barcelona"],
"paris-rome":["paris","rome"],
"london-berlin":["london","berlin"],
"lisbon-amsterdam":["lisbon","amsterdam"],
"prague-vienna":["prague","vienna"],
"budapest-dublin":["budapest","dublin"],
"copenhagen-florence":["copenhagen","florence"],
"seville-milan":["seville","milan"]
}

Object.keys(matches).forEach(match=>{

let [a,b]=matches[match]

let votesA=0
let votesB=0

data.forEach(v=>{
if(v.match===match){
if(v.choice===a) votesA++
if(v.choice===b) votesB++
}
})

if(votesA===0&&votesB===0){votesA=1;votesB=1}

let total=votesA+votesB

document.getElementById(a).innerText=Math.round(votesA/total*100)+"%"
document.getElementById(b).innerText=Math.round(votesB/total*100)+"%"

})

if(cutoffPassed()){

document.getElementById("statusText").innerText="Round of 16 finished. Quarterfinals ready."

let w1=winner(data,"madrid-barcelona","madrid","barcelona")
let w2=winner(data,"paris-rome","paris","rome")
let w3=winner(data,"london-berlin","london","berlin")
let w4=winner(data,"lisbon-amsterdam","lisbon","amsterdam")
let w5=winner(data,"prague-vienna","prague","vienna")
let w6=winner(data,"budapest-dublin","budapest","dublin")
let w7=winner(data,"copenhagen-florence","copenhagen","florence")
let w8=winner(data,"seville-milan","seville","milan")

document.getElementById("qf1a").innerText=w1
document.getElementById("qf1b").innerText=w2

document.getElementById("qf2a").innerText=w3
document.getElementById("qf2b").innerText=w4

document.getElementById("qf3a").innerText=w5
document.getElementById("qf3b").innerText=w6

document.getElementById("qf4a").innerText=w7
document.getElementById("qf4b").innerText=w8

}

}

updateBracket()
setInterval(updateBracket,1000)

</script>
