<!DOCTYPE html>
<html>
<head>

<title>Best Cities in Europe</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:40px;
}

.bracket{
display:flex;
gap:40px;
}

.round{
display:flex;
flex-direction:column;
gap:20px;
}

.match{
background:#1e293b;
padding:15px;
border-radius:10px;
width:220px;
}

.team{
display:flex;
justify-content:space-between;
padding:6px 0;
cursor:pointer;
}

.team:hover{
color:#38bdf8;
}

</style>

</head>

<body>

<h1>Best Cities in Europe</h1>

<div class="bracket">

<div class="round">

<div class="match">

<div class="team" onclick="openDuel('madrid-barcelona')">
Madrid <span id="madrid">50%</span>
</div>

<div class="team" onclick="openDuel('madrid-barcelona')">
Barcelona <span id="barcelona">50%</span>
</div>

</div>

<div class="match">

<div class="team" onclick="openDuel('paris-rome')">
Paris <span id="paris">50%</span>
</div>

<div class="team" onclick="openDuel('paris-rome')">
Rome <span id="rome">50%</span>
</div>

</div>

</div>

</div>

<script>

function openDuel(slug){

window.location.href="duel.html?match="+slug

}

</script>

</body>
</html>
