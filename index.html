<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabase = window.supabase.createClient(
"https://okaprbdbtnyiutztibcs.supabase.co",
"TU_ANON_KEY"
)

function cutoffPassed(){
const cutoff=new Date()
cutoff.setHours(19,5,0,0)
return new Date()>=cutoff
}

function openOct(match){

if(cutoffPassed()){
alert("Round of 16 closed")
return
}

window.location.href="/duel.html?match="+match
}

function openQuarter(id){

if(!cutoffPassed()){
alert("Quarterfinals not open yet")
return
}

let a=document.getElementById(id+"a").innerText.toLowerCase()
let b=document.getElementById(id+"b").innerText.toLowerCase()

window.location.href="/duel.html?match="+a+"-"+b
}

function percent(a,b){
let t=a+b
return[Math.round(a/t*100),Math.round(b/t*100)]
}

async function update(){

const {data}=await supabase.from("votes").select("*")

if(!data)return

function votes(match,a,b){

let va=0
let vb=0

data.forEach(v=>{
if(v.match===match){
if(v.choice===a)va++
if(v.choice===b)vb++
}
})

return[va,vb]
}

const matches={
"madrid-barcelona":["madrid","barcelona"],
"paris-rome":["paris","rome"],
"london-berlin":["london","berlin"],
"lisbon-amsterdam":["lisbon","amsterdam"],
"prague-vienna":["prague","vienna"],
"budapest-dublin":["budapest","dublin"],
"copenhagen-florence":["copenhagen","florence"],
"seville-milan":["seville","milan"]
}

Object.keys(matches).forEach(m=>{

let[a,b]=matches[m]

let[va,vb]=votes(m,a,b)

if(va===0&&vb===0){va=1;vb=1}

let[pA,pB]=percent(va,vb)

document.getElementById(a).innerText=pA+"%"
document.getElementById(b).innerText=pB+"%"

})


if(cutoffPassed()){

document.getElementById("status").innerText="Round of 16 closed — Quarterfinals open"

function winner(match,a,b){

let[va,vb]=votes(match,a,b)

return va>=vb?a:b
}

document.getElementById("qf1a").innerText=winner("madrid-barcelona","madrid","barcelona")
document.getElementById("qf1b").innerText=winner("paris-rome","paris","rome")

document.getElementById("qf2a").innerText=winner("london-berlin","london","berlin")
document.getElementById("qf2b").innerText=winner("lisbon-amsterdam","lisbon","amsterdam")

document.getElementById("qf3a").innerText=winner("prague-vienna","prague","vienna")
document.getElementById("qf3b").innerText=winner("budapest-dublin","budapest","dublin")

document.getElementById("qf4a").innerText=winner("copenhagen-florence","copenhagen","florence")
document.getElementById("qf4b").innerText=winner("seville-milan","seville","milan")

}

}

update()
setInterval(update,1000)

</script>
