<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Best Cities Tournament</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

h1{
text-align:center;
margin-bottom:10px;
}

#countdown{
text-align:center;
font-size:36px;
margin-bottom:25px;
color:#38bdf8;
font-weight:bold;
}

.bracket{
display:flex;
justify-content:center;
gap:40px;
}

.round{
display:flex;
flex-direction:column;
}

.match{
background:#1e293b;
padding:8px;
border-radius:8px;
width:170px;
margin:12px 0;
}

.team{
display:flex;
justify-content:space-between;
padding:6px;
cursor:pointer;
}

.team:hover{
color:#38bdf8;
}

.closed{
opacity:0.5;
cursor:default;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<h1>Best Cities in Europe</h1>

<div id="countdown">Loading...</div>

<div class="bracket" id="bracket"></div>

<script>

const supabaseClient = window.supabase.createClient(
"https://okaprbdbtnyiutztibcs.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rYXByYmRidG55aXV0enRpYmNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMDgyNjgsImV4cCI6MjA4ODg4NDI2OH0.8tfmypajrsLVbrD3-PUwkJvrM1h9aQ8UN2IP3btoNLE"
)

let roundEnd = 0


async function loadTimer(){

const {data} = await supabaseClient
.from("matches")
.select("closes_at")
.eq("status","open")
.order("closes_at",{ascending:true})
.limit(1)

if(!data || data.length===0){

document.getElementById("countdown").innerText="Tournament finished"
return

}

roundEnd = new Date(data[0].closes_at).getTime()

}


function updateTimer(){

if(roundEnd===0) return

let now = Date.now()

let diff = Math.floor((roundEnd-now)/1000)

if(diff < 0) diff = 0

let minutes = Math.floor(diff/60)
let seconds = diff % 60

let mm = String(minutes).padStart(2,"0")
let ss = String(seconds).padStart(2,"0")

document.getElementById("countdown").innerText =
`Round closes in ${mm}:${ss}`

}


async function loadBracket(){

const {data:matches} = await supabaseClient
.from("matches")
.select("*")
.order("position",{ascending:true})

const {data:votes} = await supabaseClient
.from("votes")
.select("*")

const rounds={
round16:[],
qf:[],
sf:[],
final:[]
}

matches.forEach(m=>{
rounds[m.round].push(m)
})


function countVotes(match,team){

let total=0

votes.forEach(v=>{
if(v.match_id===match.id && v.choice===team){
total++
}
})

return total

}


function percent(a,b){

if(a===0 && b===0){
return [50,50]
}

let t=a+b

return[
Math.round((a/t)*100),
Math.round((b/t)*100)
]

}


const bracket=document.getElementById("bracket")

bracket.innerHTML=""

Object.keys(rounds).forEach(round=>{

const column=document.createElement("div")
column.className="round"

rounds[round].forEach(match=>{

const box=document.createElement("div")
box.className="match"

let teamA=match.team_a || "TBD"
let teamB=match.team_b || "TBD"

let votesA=countVotes(match,teamA)
let votesB=countVotes(match,teamB)

let[pA,pB]=percent(votesA,votesB)

let classA="team"
let classB="team"

if(match.status!=="open"){
classA+=" closed"
classB+=" closed"
}

box.innerHTML=`

<div class="${classA}" onclick="openDuel('${match.id}','${match.status}')">
${teamA} <span>${pA}%</span>
</div>

<div class="${classB}" onclick="openDuel('${match.id}','${match.status}')">
${teamB} <span>${pB}%</span>
</div>

`

column.appendChild(box)

})

bracket.appendChild(column)

})

}


function openDuel(matchId,status){

if(status!=="open"){
alert("Match closed")
return
}

window.location.href="/duel.html?match_id="+matchId

}


loadTimer()
loadBracket()

setInterval(updateTimer,1000)
setInterval(loadTimer,15000)
setInterval(loadBracket,3000)

</script>

</body>
</html>
