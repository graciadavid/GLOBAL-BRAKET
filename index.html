<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Best Male Name</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#3c3ccf,#000);
color:white;
}

.title{
text-align:center;
font-size:32px;
padding:20px;
}

.bracket{
display:flex;
justify-content:center;
align-items:center;
gap:60px;
padding:20px;
flex-wrap:wrap;
}

.side{
display:flex;
gap:40px;
}

/* RONDAS */

.round{
display:flex;
flex-direction:column;
}

.round:nth-child(1){
gap:12px;
}

.round:nth-child(2){
gap:50px;
margin-top:30px;
}

.round:nth-child(3){
gap:120px;
margin-top:80px;
}

.round:nth-child(4){
gap:260px;
margin-top:160px;
}

/* MATCH BOX */

.match{
width:160px;
padding:8px;
background:linear-gradient(#eee,#bbb);
border-radius:10px;
text-align:center;
font-size:13px;
color:black;
cursor:pointer;
}

.match:hover{
background:white;
}

/* CENTER */

.center{
display:flex;
align-items:center;
justify-content:center;
}

.champion{
width:180px;
padding:14px;
background:gold;
border-radius:30px;
text-align:center;
font-weight:bold;
color:black;
}

/* MOBILE */

@media(max-width:900px){

.bracket{
flex-direction:column;
height:auto;
}

.side{
flex-direction:column;
align-items:center;
}

.round{
margin:10px 0;
gap:10px !important;
}

.center{
margin:30px 0;
}

}

</style>
  
</head>

<body>

<div class="title">BEST MALE NAME</div>

<div class="bracket">

<!-- LEFT SIDE -->

<div class="side">

<div class="round">

<div class="match" onclick="openDuel('Alejandro','Daniel')">Alejandro vs Daniel</div>
<div class="match" onclick="openDuel('Mateo','Lucas')">Mateo vs Lucas</div>
<div class="match" onclick="openDuel('Hugo','Adrian')">Hugo vs Adrian</div>
<div class="match" onclick="openDuel('Pablo','Bruno')">Pablo vs Bruno</div>
<div class="match" onclick="openDuel('Diego','Javier')">Diego vs Javier</div>
<div class="match" onclick="openDuel('Carlos','Alvaro')">Carlos vs Alvaro</div>
<div class="match" onclick="openDuel('Marco','Nicolas')">Marco vs Nicolas</div>
<div class="match" onclick="openDuel('Ivan','Sergio')">Ivan vs Sergio</div>

</div>

<div class="round">

<div class="match"></div>
<div class="match"></div>
<div class="match"></div>
<div class="match"></div>

</div>

<div class="round">

<div class="match"></div>
<div class="match"></div>

</div>

<div class="round">

<div class="match"></div>

</div>

</div>

<!-- CENTER -->

<div class="center">

<div class="champion">Champion</div>

</div>

<!-- RIGHT SIDE -->

<div class="side">

<div class="round">

<div class="match"></div>

</div>

<div class="round">

<div class="match"></div>
<div class="match"></div>

</div>

<div class="round">

<div class="match"></div>
<div class="match"></div>
<div class="match"></div>
<div class="match"></div>

</div>

<div class="round">

<div class="match" onclick="openDuel('Gabriel','Leo')">Gabriel vs Leo</div>
<div class="match" onclick="openDuel('Mario','Andres')">Mario vs Andres</div>
<div class="match" onclick="openDuel('David','Eric')">David vs Eric</div>
<div class="match" onclick="openDuel('Oscar','Raul')">Oscar vs Raul</div>
<div class="match" onclick="openDuel('Martin','Joel')">Martin vs Joel</div>
<div class="match" onclick="openDuel('Samuel','Enzo')">Samuel vs Enzo</div>
<div class="match" onclick="openDuel('Tomas','Gonzalo')">Tomas vs Gonzalo</div>
<div class="match" onclick="openDuel('Luis','Ruben')">Luis vs Ruben</div>

</div>

</div>

</div>

<script>

function openDuel(name1,name2){

window.location.href =
"duel.html?name1="+encodeURIComponent(name1)+"&name2="+encodeURIComponent(name2);

}

</script>

</body>
</html>
