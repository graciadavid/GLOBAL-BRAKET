<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Global City Cup</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#3b36b6,#000);
color:white;
text-align:center;
}

h1{
margin-top:30px;
}

.bracket{
display:flex;
justify-content:center;
gap:40px;
margin-top:60px;
}

/* COLUMNAS */

.round{
display:flex;
flex-direction:column;
}

/* GAP POR RONDA */

.r16{gap:20px;}
.qf{gap:60px;}
.sf{gap:120px;}

.final{
display:flex;
align-items:center;
}

/* MATCH */

.match{
width:140px;
height:32px;
background:linear-gradient(90deg,#eee,#bbb);
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
color:black;
font-weight:bold;
}

.champion{
background:#00e7b2;
}

</style>
</head>

<body>

<h1>GLOBAL CITY CUP</h1>

<div class="bracket">

<!-- LEFT R16 -->

<div class="round r16">
<div class="match">Tokyo</div>
<div class="match">London</div>
<div class="match">Madrid</div>
<div class="match">Rome</div>
<div class="match">Amsterdam</div>
<div class="match">Vienna</div>
<div class="match">Budapest</div>
<div class="match">Athens</div>
</div>

<!-- LEFT QF -->

<div class="round qf">
<div class="match">Winner</div>
<div class="match">Winner</div>
<div class="match">Winner</div>
<div class="match">Winner</div>
</div>

<!-- LEFT SF -->

<div class="round sf">
<div class="match">Winner</div>
<div class="match">Winner</div>
</div>

<!-- FINAL -->

<div class="round final">
<div class="match champion">CHAMPION</div>
</div>

<!-- RIGHT SF -->

<div class="round sf">
<div class="match">Winner</div>
<div class="match">Winner</div>
</div>

<!-- RIGHT QF -->

<div class="round qf">
<div class="match">Winner</div>
<div class="match">Winner</div>
<div class="match">Winner</div>
<div class="match">Winner</div>
</div>

<!-- RIGHT R16 -->

<div class="round r16">
<div class="match">Sydney</div>
<div class="match">Toronto</div>
<div class="match">Seoul</div>
<div class="match">Singapore</div>
<div class="match">Dubai</div>
<div class="match">Bangkok</div>
<div class="match">Shanghai</div>
<div class="match">Hong Kong</div>
</div>

</div>

</body>
</html>
