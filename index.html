<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Best Cities in Europe</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
zoom:0.9;
}

h1{
text-align:center;
margin-bottom:30px;
}

.status{
text-align:center;
margin-bottom:30px;
color:#93c5fd;
font-weight:bold;
}

.bracket{
display:flex;
justify-content:center;
align-items:flex-start;
gap:28px;
}

.round{
display:flex;
flex-direction:column;
}

.match{
background:#1e293b;
padding:6px;
border-radius:6px;
width:140px;
font-size:12px;
min-height:54px;
display:flex;
flex-direction:column;
justify-content:center;
}

.team{
display:flex;
justify-content:space-between;
padding:4px;
cursor:pointer;
}

.team:hover{
color:#38bdf8;
}

.locked{
opacity:0.5;
cursor:not-allowed;
}

.final{
background:#38bdf8;
color:black;
font-weight:bold;
text-align:center;
}

.round-1{gap:18px}
.round-2 .match:first-child{margin-top:36px}
.round-2 .match:last-child{margin-top:90px}
.round-3 .match{margin-top:108px}
.round-final .match{margin-top:108px}

</style>
</head>

<body>

<h1>Best Cities in Europe</h1>
<div class="status" id="statusText"></div>

<div class="bracket">

<!-- ROUND 1 -->

<div class="round round-1">

<div class="match">
<div class="team" id="oct1a" onclick="openOct('madrid-barcelona')">Madrid <span id="madrid">50%</span></div>
<div class="team" id="oct1b" onclick="openOct('madrid-barcelona')">Barcelona <span id="barcelona">50%</span></div>
</div>

<div class="match">
<div class="team" id="oct2a" onclick="openOct('paris-rome')">Paris <span id="paris">50%</span></div>
<div class="team" id="oct2b" onclick="openOct('paris-rome')">Rome <span id="rome">50%</span></div>
</div>

<div class="match">
<div class="team" id="oct3a" onclick="openOct('london-berlin')">London <span id="london">50%</span></div>
<div class="team" id="oct3b" onclick="openOct('london-berlin')">Berlin <span id="berlin">50%</span></div>
</div>

<div class="match">
<div class="team" id="oct4a" onclick="openOct('lisbon-amsterdam')">Lisbon <span id="lisbon">50%</span></div>
<div class="team" id="oct4b" onclick="openOct('lisbon-amsterdam')">Amsterdam <span id="amsterdam">50%</span></div>
</div>

</div>

<!-- QUARTERS -->

<div class="round round-2">

<div class="match">
<div class="team" id="qf1a" onclick="openQuarter('qf1')">TBD <span id="qf1ap">-</span></div>
<div class="team" id="qf1b" onclick="openQuarter('qf1')">TBD <span id="qf1bp">-</span></div>
</div>

<div class="match">
<div class="team" id="qf2a" onclick="openQuarter('qf2')">TBD <span id="qf2ap">-</span></div>
<div class="team" id="qf2b" onclick="openQuarter('qf2')">TBD <span id="qf2bp">-</span></div>
</div>

</div>

<!-- SEMI -->

<div class="round round-3">
<div class="match">
<div class="team">TBD</div>
<div class="team">TBD</div>
</div>
</div>

<!-- FINAL -->

<div class="round round-final">
<div class="match final">
FINAL
<div class="team">TBD</div>
<div class="team">TBD</div>
</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseClient = window.supabase.createClient(
"https://okaprbdbtnyiutztibcs.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rYXByYmRidG55aXV0enRpYmNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMDgyNjgsImV4cCI6MjA4ODg4NDI2OH0.8tfmypajrsLVbrD3-PUwkJvrM1h9aQ8UN2IP3btoNLE"
)

function cutoffPassed(){
const cutoff=new Date()
cutoff.setHours(19,5,0,0)
return new Date()>=cutoff
}

function openOct(match){

if(cutoffPassed()){
alert("Round of 16 is closed")
return
}

window.location.href="/duel.html?match="+match
}

function openQuarter(id){

if(!cutoffPassed()){
alert("Quarterfinals not open yet")
return
}

const team1=document.getElementById(id+"a").innerText.split(" ")[0].toLowerCase()
const team2=document.getElementById(id+"b").innerText.split(" ")[0].toLowerCase()

window.location.href="/duel.html?match="+team1+"-"+team2
}

function winner(data,match,a,b){

let va=0
let vb=0

data.forEach(v=>{
if(v.match===match){
if(v.choice===a)va++
if(v.choice===b)vb++
}
})

if(va===0&&vb===0){va=1;vb=1}

return va>=vb?a:b
}

async function updateBracket(){

const {data}=await supabaseClient
.from("votes")
.select("*")

if(!data)return

const matches={
"madrid-barcelona":["madrid","barcelona"],
"paris-rome":["paris","rome"],
"london-berlin":["london","berlin"],
"lisbon-amsterdam":["lisbon","amsterdam"]
}

Object.keys(matches).forEach(m=>{
let[a,b]=matches[m]

let va=0
let vb=0

data.forEach(v=>{
if(v.match===m){
if(v.choice===a)va++
if(v.choice===b)vb++
}
})

if(va===0&&vb===0){va=1;vb=1}

let total=va+vb

document.getElementById(a).innerText=Math.round(va/total*100)+"%"
document.getElementById(b).innerText=Math.round(vb/total*100)+"%"
})

if(cutoffPassed()){

document.getElementById("statusText").innerText="Round of 16 finished. Quarterfinals open."

document.querySelectorAll(".round-1 .team").forEach(t=>t.classList.add("locked"))

let w1=winner(data,"madrid-barcelona","madrid","barcelona")
let w2=winner(data,"paris-rome","paris","rome")
let w3=winner(data,"london-berlin","london","berlin")
let w4=winner(data,"lisbon-amsterdam","lisbon","amsterdam")

document.getElementById("qf1a").innerHTML=w1+" <span id='qf1ap'>50%</span>"
document.getElementById("qf1b").innerHTML=w2+" <span id='qf1bp'>50%</span>"

document.getElementById("qf2a").innerHTML=w3+" <span id='qf2ap'>50%</span>"
document.getElementById("qf2b").innerHTML=w4+" <span id='qf2bp'>50%</span>"

}

}

updateBracket()
setInterval(updateBracket,1000)

</script>

</body>
</html>
