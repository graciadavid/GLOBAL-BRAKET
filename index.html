<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Bracket 32</title>

<style>

body{
background:#0b0f1a;
color:white;
font-family:Arial;
margin:0;
padding:40px;
overflow-x:auto;
}

.bracket{
display:grid;
grid-template-columns:
220px 60px
220px 60px
220px 60px
220px 160px
220px 60px
220px 60px
220px 60px
220px;
align-items:center;
min-width:1600px;
}

.round{
display:flex;
flex-direction:column;
justify-content:center;
}

.match{
background:#141c2e;
border-radius:8px;
padding:10px;
margin:12px 0;
text-align:center;
border:1px solid rgba(255,255,255,0.08);
height:42px;
display:flex;
align-items:center;
justify-content:center;
}

.empty{
opacity:0.3;
}

.connector{
border-top:2px solid rgba(255,255,255,0.15);
height:1px;
}

.final{
background:#1e2b47;
font-weight:bold;
height:60px;
}

.title{
text-align:center;
margin-bottom:20px;
font-size:26px;
}

</style>

</head>

<body>

<div class="title">Bracket Popular</div>

<div class="bracket">

<!-- ROUND 1 LEFT -->
<div class="round" id="left-r1"></div>

<div></div>

<!-- ROUND 2 LEFT -->
<div class="round" id="left-r2"></div>

<div></div>

<!-- ROUND 3 LEFT -->
<div class="round" id="left-r3"></div>

<div></div>

<!-- ROUND 4 LEFT -->
<div class="round" id="left-r4"></div>

<div></div>

<!-- FINAL -->
<div class="round">
<div class="match final empty" id="final">FINAL</div>
</div>

<div></div>

<!-- ROUND 4 RIGHT -->
<div class="round" id="right-r4"></div>

<div></div>

<!-- ROUND 3 RIGHT -->
<div class="round" id="right-r3"></div>

<div></div>

<!-- ROUND 2 RIGHT -->
<div class="round" id="right-r2"></div>

<div></div>

<!-- ROUND 1 RIGHT -->
<div class="round" id="right-r1"></div>

</div>

<script>

// 16 equipos por lado
const leftTeams = [
"Team 1","Team 2","Team 3","Team 4",
"Team 5","Team 6","Team 7","Team 8",
"Team 9","Team 10","Team 11","Team 12",
"Team 13","Team 14","Team 15","Team 16"
];

const rightTeams = [
"Team 17","Team 18","Team 19","Team 20",
"Team 21","Team 22","Team 23","Team 24",
"Team 25","Team 26","Team 27","Team 28",
"Team 29","Team 30","Team 31","Team 32"
];

function createMatch(name){
const div=document.createElement("div");
div.className="match";
div.textContent=name;
return div;
}

function createEmpty(){
const div=document.createElement("div");
div.className="match empty";
div.textContent="—";
return div;
}

// RONDA 1

const leftR1=document.getElementById("left-r1");
leftTeams.forEach(t=>leftR1.appendChild(createMatch(t)));

const rightR1=document.getElementById("right-r1");
rightTeams.forEach(t=>rightR1.appendChild(createMatch(t)));


// RONDA 2 (vacía)

const leftR2=document.getElementById("left-r2");
for(let i=0;i<8;i++) leftR2.appendChild(createEmpty());

const rightR2=document.getElementById("right-r2");
for(let i=0;i<8;i++) rightR2.appendChild(createEmpty());


// RONDA 3

const leftR3=document.getElementById("left-r3");
for(let i=0;i<4;i++) leftR3.appendChild(createEmpty());

const rightR3=document.getElementById("right-r3");
for(let i=0;i<4;i++) rightR3.appendChild(createEmpty());


// RONDA 4

const leftR4=document.getElementById("left-r4");
for(let i=0;i<2;i++) leftR4.appendChild(createEmpty());

const rightR4=document.getElementById("right-r4");
for(let i=0;i<2;i++) rightR4.appendChild(createEmpty());

</script>

</body>
</html>
