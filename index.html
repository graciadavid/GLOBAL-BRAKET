<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Best Cities in Europe</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
zoom:0.9;
}

h1{
text-align:center;
margin-bottom:40px;
}

.bracket{
display:flex;
justify-content:center;
align-items:flex-start;
gap:30px;
}

/* ROUNDS */

.round{
display:flex;
flex-direction:column;
gap:20px;
}

/* MATCH BOX */

.match{
background:#1e293b;
padding:6px;
border-radius:6px;
width:130px;
font-size:12px;
min-height:54px;
display:flex;
flex-direction:column;
justify-content:center;
position:relative;
}

.team{
display:flex;
justify-content:space-between;
padding:4px;
cursor:pointer;
}

.team:hover{
color:#38bdf8;
}

/* FINAL */

.final{
background:#38bdf8;
color:black;
font-weight:bold;
text-align:center;
}

/* SPACING */

.round-1{gap:18px}

.round-2 .match:first-child{margin-top:36px}
.round-2 .match:last-child{margin-top:90px}

.round-3 .match{margin-top:108px}

.round-final .match{margin-top:108px}

/* CONNECTOR COLUMN */

.connector{
width:30px;
position:relative;
}

/* HORIZONTAL */

.h{
height:2px;
background:#475569;
position:absolute;
width:30px;
}

/* VERTICAL */

.v{
width:2px;
background:#475569;
position:absolute;
left:14px;
}

/* CONNECTOR POSITIONS */

.c1{top:27px}
.c2{top:99px}
.c3{top:171px}
.c4{top:243px}

.v1{top:27px;height:72px}
.v2{top:171px;height:72px}

.v3{top:63px;height:144px}

</style>
</head>
