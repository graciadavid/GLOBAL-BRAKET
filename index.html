<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Best Cities in Europe</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>

body{
background:black;
color:white;
text-align:center;
font-family:'Bebas Neue',sans-serif;
margin:0;
}

h1{
margin-top:20px;
letter-spacing:2px;
}

#countdown{
font-size:50px;
margin-bottom:20px;
}

.bracket-container{
position:relative;
width:1600px;
margin:auto;
}

.bracket-img{
width:100%;
}


/* TEAM BOX */

.team{
position:absolute;
width:150px;
display:flex;
justify-content:space-between;
font-size:22px;
text-transform:uppercase;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<h1>BEST CITIES IN EUROPE</h1>

<div id="countdown">--:--</div>

<div class="bracket-container">

<img src="bracket.png" class="bracket-img">


<!-- ROUND 8 LEFT -->

<div class="team" id="m1a" style="top:240px; left:130px"></div>
<div class="team" id="m1b" style="top:300px; left:130px"></div>

<div class="team" id="m2a" style="top:420px; left:130px"></div>
<div class="team" id="m2b" style="top:480px; left:130px"></div>

<div class="team" id="m3a" style="top:600px; left:130px"></div>
<div class="team" id="m3b" style="top:660px; left:130px"></div>

<div class="team" id="m4a" style="top:780px; left:130px"></div>
<div class="team" id="m4b" style="top:840px; left:130px"></div>


<!-- ROUND 8 RIGHT -->

<div class="team" id="m5a" style="top:240px; right:130px"></div>
<div class="team" id="m5b" style="top:300px; right:130px"></div>

<div class="team" id="m6a" style="top:420px; right:130px"></div>
<div class="team" id="m6b" style="top:480px; right:130px"></div>

<div class="team" id="m7a" style="top:600px; right:130px"></div>
<div class="team" id="m7b" style="top:660px; right:130px"></div>

<div class="team" id="m8a" style="top:780px; right:130px"></div>
<div class="team" id="m8b" style="top:840px; right:130px"></div>


</div>


<script>

const supabase = window.supabase.createClient(
"https://okaprbdbtnyiutztibcs.supabase.co",
"YOUR_ANON_KEY"
)



async function loadBracket(){

const {data:matches} = await supabase
.from("matches")
.select("*")
.order("position",{ascending:true})


const {data:votes} = await supabase
.from("votes")
.select("*")


matches.forEach((match,i)=>{

let teamA = match.team_a || "TBD"
let teamB = match.team_b || "TBD"

let votesA = votes.filter(v=>v.match_id===match.id && v.choice===teamA).length
let votesB = votes.filter(v=>v.match_id===match.id && v.choice===teamB).length

let total = votesA + votesB

let pA = total ? Math.round(votesA/total*100) : 50
let pB = total ? Math.round(votesB/total*100) : 50

document.getElementById("m"+(i+1)+"a").innerText = teamA+" "+pA+"%"
document.getElementById("m"+(i+1)+"b").innerText = teamB+" "+pB+"%"

})

}

loadBracket()

setInterval(loadBracket,3000)

</script>

</body>

</html>
