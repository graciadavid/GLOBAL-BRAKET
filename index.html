<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bracket 32</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#3c3ccf,#000);
color:white;
}

.title{
text-align:center;
font-size:40px;
padding:30px;
}

.bracket{
display:flex;
justify-content:center;
align-items:center;
gap:40px;
}

.column{
display:flex;
flex-direction:column;
gap:25px;
}

.match{
width:180px;
height:40px;
background:linear-gradient(#eee,#bbb);
border-radius:20px;
}

.center{
display:flex;
flex-direction:column;
align-items:center;
gap:40px;
}

.champion{
width:200px;
height:50px;
background:linear-gradient(#eee,#bbb);
border-radius:25px;
}

</style>

</head>

<body>

<div class="title">CHAMPION</div>

<div class="bracket">

<!-- LEFT SIDE -->

<div class="column">

<div class="match"></div>
<div class="match"></div>
<div class="match"></div>
<div class="match"></div>
<div class="match"></div>
<div class="match"></div>
<div class="match"></div>
<div class="match"></div>

</div>

<div class="column">

<div class="match"></div>
<div class="match"></div>
<div class="match"></div>
<div class="match"></div>

</div>

<div class="column">

<div class="match"></div>
<div class="match"></div>

</div>

<div class="column">

<div class="match"></div>

</div>

<!-- CENTER -->

<div class="center">

<div class="champion"></div>

</div>

<!-- RIGHT SIDE -->

<div class="column">

<div class="match"></div>

</div>

<div class="column">

<div class="match"></div>
<div class="match"></div>

</div>

<div class="column">

<div class="match"></div>
<div class="match"></div>
<div class="match"></div>
<div class="match"></div>

</div>

<div class="column">

<div class="match"></div>
<div class="match"></div>
<div class="match"></div>
<div class="match"></div>
<div class="match"></div>
<div class="match"></div>
<div class="match"></div>
<div class="match"></div>

</div>

</div>

</body>
</html>
