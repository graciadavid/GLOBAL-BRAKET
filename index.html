<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Best Male Name</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#3c3ccf,#000);
color:white;
}

.title{
text-align:center;
font-size:40px;
padding:30px;
letter-spacing:2px;
}

/* BRACKET */

.bracket{
display:flex;
justify-content:center;
align-items:center;
gap:70px;
padding:40px;
}

/* SIDES */

.side{
display:flex;
gap:50px;
}

/* ROUNDS */

.round{
display:flex;
flex-direction:column;
}

/* 16 matches */

.round.r1{
gap:14px;
}

/* 8 matches */

.round.r2{
gap:70px;
margin-top:35px;
}

/* 4 matches */

.round.r3{
gap:170px;
margin-top:95px;
}

/* 2 matches */

.round.r4{
gap:360px;
margin-top:190px;
}

/* MATCH BOX */

.match{
width:180px;
padding:10px;
background:linear-gradient(#eee,#bbb);
border-radius:12px;
text-align:center;
font-size:14px;
color:black;
cursor:pointer;
transition:0.2s;
}

.match:hover{
background:white;
transform:scale(1.05);
}

/* CENTER */

.center{
display:flex;
align-items:center;
justify-content:center;
}

.champion{
width:200px;
padding:16px;
background:gold;
border-radius:40px;
text-align:center;
font-weight:bold;
font-size:18px;
color:black;
}

</style>
</head>

<body>

<div class="title">BEST MALE NAME</div>

<div class="bracket">

<!-- LEFT SIDE -->

<div class="side">

<div class="round r1">

<div class="match" onclick="openDuel('Alejandro','Daniel')">Alejandro vs Daniel</div>
<div class="match" onclick="openDuel('Mateo','Lucas')">Mateo vs Lucas</div>
<div class="match" onclick="openDuel('Hugo','Adrian')">Hugo vs Adrian</div>
<div class="match" onclick="openDuel('Pablo','Bruno')">Pablo vs Bruno</div>
<div class="match" onclick="openDuel('Diego','Javier')">Diego vs Javier</div>
<div class="match" onclick="openDuel('Carlos','Alvaro')">Carlos vs Alvaro</div>
<div class="match" onclick="openDuel('Marco','Nicolas')">Marco vs Nicolas</div>
<div class="match" onclick="openDuel('Ivan','Sergio')">Ivan vs Sergio</div>

</div>

<div class="round r2">
<div class="match"></div>
<div class="match"></div>
<div class="match"></div>
<div class="match"></div>
</div>

<div class="round r3">
<div class="match"></div>
<div class="match"></div>
</div>

<div class="round r4">
<div class="match"></div>
</div>

</div>

<!-- CENTER -->

<div class="center">
<div class="champion">Champion</div>
</div>

<!-- RIGHT SIDE -->

<div class="side">

<div class="round r4">
<div class="match"></div>
</div>

<div class="round r3">
<div class="match"></div>
<div class="match"></div>
</div>

<div class="round r2">
<div class="match"></div>
<div class="match"></div>
<div class="match"></div>
<div class="match"></div>
</div>

<div class="round r1">

<div class="match" onclick="openDuel('Gabriel','Leo')">Gabriel vs Leo</div>
<div class="match" onclick="openDuel('Mario','Andres')">Mario vs Andres</div>
<div class="match" onclick="openDuel('David','Eric')">David vs Eric</div>
<div class="match" onclick="openDuel('Oscar','Raul')">Oscar vs Raul</div>
<div class="match" onclick="openDuel('Martin','Joel')">Martin vs Joel</div>
<div class="match" onclick="openDuel('Samuel','Enzo')">Samuel vs Enzo</div>
<div class="match" onclick="openDuel('Tomas','Gonzalo')">Tomas vs Gonzalo</div>
<div class="match" onclick="openDuel('Luis','Ruben')">Luis vs Ruben</div>

</div>

</div>

</div>

<script>

function openDuel(name1,name2){

window.location.href =
"duel.html?name1="+encodeURIComponent(name1)+"&name2="+encodeURIComponent(name2);

}

</script>

</body>
</html>
