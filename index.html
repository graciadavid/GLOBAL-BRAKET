<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Global City Cup</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#3b36b6,#000);
color:white;
text-align:center;
}

h1{
margin-top:30px;
letter-spacing:3px;
font-size:28px;
}

/* BRACKET GRID */

.bracket{
display:grid;
grid-template-columns:
120px 120px 120px 120px 120px 120px 120px 120px 120px;
justify-content:center;
gap:15px;
margin-top:40px;
}

/* MATCH */

.match{
background:linear-gradient(90deg,#eee,#bbb);
border-radius:25px;
height:32px;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
color:black;
font-weight:bold;
}

/* SPACING POR RONDA */

.r32 .match{margin:12px 0;}
.r16 .match{margin:30px 0;}
.qf .match{margin:60px 0;}
.sf .match{margin:90px 0;}
.final .match{margin:110px 0;}

</style>

</head>

<body>

<h1>GLOBAL CITY CUP</h1>

<div class="bracket">

<!-- LEFT R32 -->
<div class="round r32">
<div class="match">Tokyo</div>
<div class="match">London</div>
<div class="match">Madrid</div>
<div class="match">Rome</div>
<div class="match">Amsterdam</div>
<div class="match">Vienna</div>
<div class="match">Budapest</div>
<div class="match">Athens</div>
</div>

<!-- LEFT R16 -->
<div class="round r16">
<div class="match">Winner</div>
<div class="match">Winner</div>
<div class="match">Winner</div>
<div class="match">Winner</div>
</div>

<!-- LEFT QF -->
<div class="round qf">
<div class="match">Winner</div>
<div class="match">Winner</div>
</div>

<!-- LEFT SF -->
<div class="round sf">
<div class="match">Winner</div>
</div>

<!-- FINAL -->
<div class="round final">
<div class="match">CHAMPION</div>
</div>

<!-- RIGHT SF -->
<div class="round sf">
<div class="match">Winner</div>
</div>

<!-- RIGHT QF -->
<div class="round qf">
<div class="match">Winner</div>
<div class="match">Winner</div>
</div>

<!-- RIGHT R16 -->
<div class="round r16">
<div class="match">Winner</div>
<div class="match">Winner</div>
<div class="match">Winner</div>
<div class="match">Winner</div>
</div>

<!-- RIGHT R32 -->
<div class="round r32">
<div class="match">Sydney</div>
<div class="match">Toronto</div>
<div class="match">Seoul</div>
<div class="match">Singapore</div>
<div class="match">Dubai</div>
<div class="match">Bangkok</div>
<div class="match">Shanghai</div>
<div class="match">Hong Kong</div>
</div>

</div>

</body>
</html>
