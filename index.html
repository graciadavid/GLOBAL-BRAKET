<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseClient = window.supabase.createClient(
"https://okaprbdbtnyiutztibcs.supabase.co",
"TU_ANON_KEY"
)

function voteOct(match){

const cutoff=new Date()
cutoff.setHours(19,5,0,0)

if(new Date()>=cutoff){
alert("Round of 16 closed")
return
}

window.location.href="/duel.html?match="+match

}

function percent(a,b){
let total=a+b
return[Math.round(a/total*100),Math.round(b/total*100)]
}

async function updatePercentages(){

const {data}=await supabaseClient
.from("votes")
.select("*")

if(!data)return

const matches={
"madrid-barcelona":["madrid","barcelona"],
"paris-rome":["paris","rome"],
"london-berlin":["london","berlin"],
"lisbon-amsterdam":["lisbon","amsterdam"],
"prague-vienna":["prague","vienna"],
"budapest-dublin":["budapest","dublin"],
"copenhagen-florence":["copenhagen","florence"],
"seville-milan":["seville","milan"]
}

Object.keys(matches).forEach(match=>{

let[a,b]=matches[match]

let votesA=0
let votesB=0

data.forEach(v=>{
if(v.match===match){
if(v.choice===a)votesA++
if(v.choice===b)votesB++
}
})

if(votesA===0 && votesB===0){
votesA=1
votesB=1
}

let[pA,pB]=percent(votesA,votesB)

document.getElementById(a).innerText=pA+"%"
document.getElementById(b).innerText=pB+"%"

})

}

updatePercentages()
setInterval(updatePercentages,2000)

</script>
