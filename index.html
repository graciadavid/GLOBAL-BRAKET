<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>

body{
background:linear-gradient(#3a36b0,#000);
font-family:sans-serif;
color:white;
text-align:center;
}

.bracket{
display:flex;
justify-content:center;
gap:40px;
margin-top:60px;
}

/* COLUMNAS */

.col{
display:flex;
flex-direction:column;
}

/* SEPARACIÓN REAL DE RONDAS */

.r16{ gap:20px }
.qf{ gap:80px }
.sf{ gap:180px }

/* PARTIDOS */

.match{
width:140px;
height:32px;
background:#ddd;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
color:#000;
font-size:12px;
}

/* FINAL */

.final{
display:flex;
align-items:center;
}

.champion{
background:#00e7b2;
font-weight:bold;
}

</style>

</head>

<body>

<h2>GLOBAL CITY CUP</h2>

<div class="bracket">

<div class="col r16">
<div class="match">Tokyo</div>
<div class="match">London</div>
<div class="match">Madrid</div>
<div class="match">Rome</div>
<div class="match">Amsterdam</div>
<div class="match">Vienna</div>
<div class="match">Budapest</div>
<div class="match">Athens</div>
</div>

<div class="col qf">
<div class="match">Winner</div>
<div class="match">Winner</div>
<div class="match">Winner</div>
<div class="match">Winner</div>
</div>

<div class="col sf">
<div class="match">Winner</div>
<div class="match">Winner</div>
</div>

<div class="col final">
<div class="match champion">CHAMPION</div>
</div>

<div class="col sf">
<div class="match">Winner</div>
<div class="match">Winner</div>
</div>

<div class="col qf">
<div class="match">Winner</div>
<div class="match">Winner</div>
<div class="match">Winner</div>
<div class="match">Winner</div>
</div>

<div class="col r16">
<div class="match">Sydney</div>
<div class="match">Toronto</div>
<div class="match">Seoul</div>
<div class="match">Singapore</div>
<div class="match">Dubai</div>
<div class="match">Bangkok</div>
<div class="match">Shanghai</div>
<div class="match">Hong Kong</div>
</div>

</div>

</body>
</html>
