<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Global City Cup</title>

<style>

body{
background:#0e0e0e;
font-family:Arial;
color:white;
text-align:center;
}

h1{

}

.bracket{
display:flex;
justify-content:center;

}

.round{

}

.match{

}

.city{
display:flex;
justify-content:space-between;
padding:5px 0;
}

button{
background:#00ff88;
border:none;
border-radius:4px;
padding:2px 6px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>🌍 GLOBAL CITY CUP</h1>

<div class="bracket">

<div class="round">

<div class="match">

<div class="city">New York <button>Vote</button></div>
</div>

<div class="match">

<div class="city">Paris <button>Vote</button></div>
</div>

<div class="match">
<div class="city">Madrid <button>Vote</button></div>
<div class="city">Barcelona <button>Vote</button></div>
</div>

<div class="match">
<div class="city">Rome <button>Vote</button></div>
<div class="city">Berlin <button>Vote</button></div>
</div>

</div>


<div class="round">
<h3>Quarterfinal</h3>

<div class="match">Winner</div>
<div class="match">Winner</div>

</div>


<div class="round">
<h3>Semifinal</h3>

<div class="match">Winner</div>

</div>


<div class="round">

<div class="match">Winner</div>

</div>


</div>

</body>
</html>
