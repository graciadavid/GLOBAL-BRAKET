<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseClient = window.supabase.createClient(
"https://okaprbdbtnyiutztibcs.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rYXByYmRidG55aXV0enRpYmNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMDgyNjgsImV4cCI6MjA4ODg4NDI2OH0.8tfmypajrsLVbrD3-PUwkJvrM1h9aQ8UN2IP3btoNLE"
)

async function updatePercentages(){

const matches = [
"madrid-barcelona",
"paris-rome",
"london-berlin",
"lisbon-amsterdam",
"prague-vienna",
"budapest-dublin",
"copenhagen-florence",
"seville-milan"
]

for(const match of matches){

const { data, error } = await supabaseClient
.from("votes")
.select("choice")
.eq("match", match)

if(error){
console.log(error)
continue
}

let teamA = match.split("-")[0]
let teamB = match.split("-")[1]

let votesA = 0
let votesB = 0

if(data){
votesA = data.filter(v => v.choice === teamA).length
votesB = data.filter(v => v.choice === teamB).length
}

if(votesA === 0 && votesB === 0){
votesA = 1
votesB = 1
}

let total = votesA + votesB

let pctA = Math.round((votesA/total)*100)
let pctB = Math.round((votesB/total)*100)

document.getElementById(teamA).innerText = pctA + "%"
document.getElementById(teamB).innerText = pctB + "%"

}

}

updatePercentages()

setInterval(updatePercentages, 1000)

</script>
