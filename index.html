<!DOCTYPE html>
<html>
<head>

<style>

  background:#0f172a;

.bracket{

/* ROUND 3: centered between round 2 matches */

/* FINAL: centered between semis */

<body>

<script>
function openDuel(slug){
  window.location.href="/duel.html?match="+slug
}
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
  "https://okaprbdbtnyiutztibcs.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rYXByYmRidG55aXV0enRpYmNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMDgyNjgsImV4cCI6MjA4ODg4NDI2OH0.8tfmypajrsLVbrD3-PUwkJvrM1h9aQ8UN2IP3btoNLE"
)

async function updatePercentages(){
  const { data } = await supabaseClient
    .from("votes")
    .select("*")

  if(!data) return

  const matches = {
    "madrid-barcelona":["madrid","barcelona"],
    "paris-rome":["paris","rome"],
    "london-berlin":["london","berlin"],
    "lisbon-amsterdam":["lisbon","amsterdam"],
    "prague-vienna":["prague","vienna"],
    "budapest-dublin":["budapest","dublin"],
    "copenhagen-florence":["copenhagen","florence"],
    "seville-milan":["seville","milan"]
  }

  Object.keys(matches).forEach(match=>{
    const [a,b] = matches[match]

    let votesA = 0
    let votesB = 0

    data.forEach(v=>{
      if(v.match === match){
        if(v.choice === a) votesA++
        if(v.choice === b) votesB++
      }
    })

    if(votesA === 0 && votesB === 0){
      votesA = 1
      votesB = 1
    }

    let total = votesA + votesB

    document.getElementById(a).innerText = Math.round(votesA/total*100) + "%"
    document.getElementById(b).innerText = Math.round(votesB/total*100) + "%"
  })
}

updatePercentages()
setInterval(updatePercentages, 1000)
</script>

</body>
