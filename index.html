<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bracket 16</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:40px;
}

.bracket{
position:relative;
display:flex;
gap:120px;
}

/* ROUNDS */

.round{
display:flex;
flex-direction:column;
gap:60px;
}

/* BOX */

.box{
width:180px;
height:60px;
background:#888;
border-radius:30px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.final{
width:220px;
height:70px;
background:#38bdf8;
color:black;
}

/* SVG LINES */

.lines{
position:absolute;
left:0;
top:0;
width:1200px;
height:800px;
pointer-events:none;
}

.lines path{
stroke:black;
stroke-width:4;
fill:none;
}

</style>
</head>

<body>

<div class="bracket">

<!-- ROUND 1 (16 teams) -->

<div class="round">

<div class="box">Team 1</div>
<div class="box">Team 2</div>

<div class="box">Team 3</div>
<div class="box">Team 4</div>

<div class="box">Team 5</div>
<div class="box">Team 6</div>

<div class="box">Team 7</div>
<div class="box">Team 8</div>

</div>

<!-- QUARTERS -->

<div class="round">

<div class="box">Winner</div>
<div class="box">Winner</div>
<div class="box">Winner</div>
<div class="box">Winner</div>

</div>

<!-- SEMIS -->

<div class="round">

<div class="box">Winner</div>
<div class="box">Winner</div>

</div>

<!-- FINAL -->

<div class="round">

<div class="box final">FINAL</div>

</div>

<!-- CONNECTOR LINES -->

<svg class="lines">

<!-- ROUND1 → QUARTERS -->

<path d="M180 50 H230 V110 H280" />
<path d="M180 170 H230 V110 H280" />

<path d="M180 290 H230 V350 H280" />
<path d="M180 410 H230 V350 H280" />

<path d="M180 530 H230 V590 H280" />
<path d="M180 650 H230 V590 H280" />

<path d="M180 770 H230 V830 H280" />
<path d="M180 890 H230 V830 H280" />

<!-- QUARTERS → SEMIS -->

<path d="M460 110 H510 V230 H560" />
<path d="M460 350 H510 V230 H560" />

<path d="M460 590 H510 V710 H560" />
<path d="M460 830 H510 V710 H560" />

<!-- SEMIS → FINAL -->

<path d="M740 230 H790 V470 H840" />
<path d="M740 710 H790 V470 H840" />

</svg>

</div>

</body>
</html>
