<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabase = window.supabase.createClient(
"https://okaprbdbtnyiutztibcs.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rYXByYmRidG55aXV0enRpYmNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMDgyNjgsImV4cCI6MjA4ODg4NDI2OH0.8tfmypajrsLVbrD3-PUwkJvrM1h9aQ8UN2IP3btoNLE"
)

async function updatePercentages(){

const { data } = await supabase
.from("votes")
.select("match,choice")

if(!data) return

const counts = {}

data.forEach(v=>{

const match = v.match.toLowerCase()
const choice = v.choice.toLowerCase()

if(!counts[match]) counts[match]={}
if(!counts[match][choice]) counts[match][choice]=0

counts[match][choice]++

})

const matches=[
"madrid-barcelona",
"paris-rome",
"london-berlin",
"lisbon-amsterdam",
"prague-vienna",
"budapest-dublin",
"copenhagen-florence",
"seville-milan"
]

matches.forEach(match=>{

let teamA=match.split("-")[0]
let teamB=match.split("-")[1]

let votesA=counts[match]?.[teamA]||0
let votesB=counts[match]?.[teamB]||0

if(votesA===0 && votesB===0){
votesA=1
votesB=1
}

let total=votesA+votesB

let pctA=Math.round(votesA/total*100)
let pctB=Math.round(votesB/total*100)

document.getElementById(teamA).innerText=pctA+"%"
document.getElementById(teamB).innerText=pctB+"%"

})

}

updatePercentages()

setInterval(updatePercentages,1000)

</script>
