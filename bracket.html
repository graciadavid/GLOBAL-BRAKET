<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bracket</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#3c3ccf,#000);
overflow:hidden;
color:white;
}

.title{
position:absolute;
top:20px;
width:100%;
text-align:center;
font-size:36px;
}

.stage{
position:absolute;
left:50%;
top:50%;
transform-origin:center;
}

/* GRID */

.bracket{
width:1700px;
height:900px;

display:grid;
grid-template-columns:
170px 170px 170px 170px 170px 240px
170px 170px 170px 170px 170px;

align-items:center;
}

/* ROUND */

.round{
position:relative;
height:800px;
}

/* MATCH */

.match{
position:absolute;
width:160px;
transform:translateY(-50%);
}

/* PLAYER */

.player{
background:linear-gradient(#eee,#bbb);
color:black;
border-radius:8px;
padding:6px 8px;
margin:3px 0;
display:flex;
justify-content:space-between;
font-size:12px;
}

.clickable{
cursor:pointer;
}

.clickable:hover{
background:white;
}

/* CHAMPION */

.champion{
background:gold;
padding:18px 40px;
border-radius:30px;
color:black;
font-weight:bold;
text-align:center;
}

</style>
</head>

<body>

<div class="title">BEST MALE NAME</div>

<div class="stage" id="stage">

<div class="bracket">

<div class="round" id="r1L"></div>
<div class="round" id="r2L"></div>
<div class="round" id="r3L"></div>
<div class="round" id="r4L"></div>
<div class="round" id="r5L"></div>

<div style="display:flex;align-items:center;justify-content:center;">
<div class="champion">Champion</div>
</div>

<div class="round" id="r5R"></div>
<div class="round" id="r4R"></div>
<div class="round" id="r3R"></div>
<div class="round" id="r2R"></div>
<div class="round" id="r1R"></div>

</div>
</div>

<script>

/* PLAYERS */

const players = [
"Alejandro","Daniel","Mateo","Lucas","Hugo","Adrian","Pablo","Bruno",
"Diego","Javier","Carlos","Alvaro","Marco","Nicolas","Ivan","Sergio",
"Gabriel","Leo","Mario","Andres","David","Eric","Oscar","Raul",
"Martin","Joel","Samuel","Enzo","Tomas","Gonzalo","Luis","Ruben"
]

/* OPEN DUEL */

function openDuel(a,b){

window.location.href =
"duel.html?name1="+encodeURIComponent(a)+"&name2="+encodeURIComponent(b)

}

/* PLAYER BOX */

function player(name,opponent){

return `
<div class="player clickable"
onclick="openDuel('${name}','${opponent}')">
${name}<span>50%</span>
</div>
`

}

/* EMPTY */

function emptyPlayer(){
return `<div class="player">&nbsp;</div>`
}

/* MATCH */

function match(p1,p2){

return `
<div class="player clickable" onclick="openDuel('${p1}','${p2}')">${p1}<span>50%</span></div>
<div class="player clickable" onclick="openDuel('${p1}','${p2}')">${p2}<span>50%</span></div>
`

}

/* CENTERS */

function centers(count,height){

let space=height/count
let arr=[]

for(let i=0;i<count;i++)
arr.push(space*i + space/2)

return arr

}

/* RENDER ROUND */

function renderRound(id,matches){

let container=document.getElementById(id)
let height=800
let c=centers(matches.length,height)

matches.forEach((m,i)=>{

let el=document.createElement("div")
el.className="match"
el.style.top=c[i]+"px"
el.innerHTML=m

container.appendChild(el)

})

}

/* BUILD LEFT */

let left=players.slice(0,16)
let right=players.slice(16)

/* ROUND 1 */

let r1L=[]
let r1R=[]

for(let i=0;i<16;i+=2){
r1L.push(match(left[i],left[i+1]))
}

for(let i=0;i<16;i+=2){
r1R.push(match(right[i],right[i+1]))
}

renderRound("r1L",r1L)
renderRound("r1R",r1R)

/* FUTURE ROUNDS */

function emptyMatches(count){

let arr=[]

for(let i=0;i<count;i++)
arr.push(emptyPlayer())

return arr

}

renderRound("r2L",emptyMatches(4))
renderRound("r3L",emptyMatches(2))
renderRound("r4L",emptyMatches(1))
renderRound("r5L",emptyMatches(1))

renderRound("r2R",emptyMatches(4))
renderRound("r3R",emptyMatches(2))
renderRound("r4R",emptyMatches(1))
renderRound("r5R",emptyMatches(1))

/* SCALE */

function scale(){

let w=1700
let h=900

let s=Math.min(
window.innerWidth/w,
window.innerHeight/h
)

document.getElementById("stage").style.transform=
`translate(-50%,-50%) scale(${s})`

}

window.addEventListener("resize",scale)
scale()

</script>

</body>
</html>
