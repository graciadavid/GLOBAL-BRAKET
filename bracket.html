<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Male Name</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(180deg,#3c3ccf 0%, #1a1a88 45%, #020214 100%);
  color:white;
}

.page{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
}

.title{
  position:absolute;
  top:22px;
  left:0;
  right:0;
  text-align:center;
  font-size:34px;
  font-weight:400;
  z-index:5;
}

.debug{
  position:absolute;
  top:72px;
  left:0;
  right:0;
  text-align:center;
  color:#ffe96e;
  font-size:13px;
  z-index:5;
}

.stage{
  position:absolute;
  left:50%;
  top:50%;
  transform-origin:center center;
}

.bracket{
  position:relative;
  width:1700px;
  height:900px;
}

/* columnas */
.col{
  position:absolute;
  top:150px;
  height:650px;
  width:190px;
}

.c1{ left:20px; }
.c2{ left:250px; }
.c3{ left:480px; }
.c4{ left:710px; }
.c5{ left:940px; }   /* final */
.c6{ left:1170px; }
.c7{ left:1400px; }
.c8{ left:1630px; }

/* cajas */
.box{
  position:absolute;
  left:0;
  width:190px;
  min-height:44px;
  padding:10px 12px;
  border-radius:12px;
  background:linear-gradient(180deg,#f1f1f1 0%, #cfcfcf 100%);
  color:#111;
  transform:translateY(-50%);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  box-shadow:0 4px 14px rgba(0,0,0,0.14);
  font-size:14px;
  line-height:1.15;
}

.box.clickable{
  cursor:pointer;
  transition:transform .15s ease, background .15s ease;
}

.box.clickable:hover{
  transform:translateY(-50%) scale(1.03);
  background:linear-gradient(180deg,#ffffff 0%, #dddddd 100%);
}

.box.empty{
  opacity:.38;
  justify-content:center;
  cursor:default;
}

.name{
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.percent{
  font-weight:700;
  flex-shrink:0;
}

.champion{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:180px;
  height:66px;
  border-radius:999px;
  background:#ffd700;
  color:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  font-weight:700;
  box-shadow:0 8px 22px rgba(0,0,0,0.18);
}

/* móvil */
@media (max-width: 900px){
  html,body{
    overflow:auto;
  }

  .page{
    height:auto;
    min-height:100vh;
    overflow:auto;
  }

  .title,
  .debug{
    position:static;
  }

  .title{
    padding-top:20px;
  }

  .debug{
    padding-bottom:10px;
  }

  .stage{
    position:relative;
    left:auto;
    top:auto;
    transform:none !important;
    width:100%;
    padding:0 16px 40px;
  }

  .bracket{
    width:100%;
    height:auto;
    display:grid;
    grid-template-columns:1fr;
    gap:14px;
  }

  .col{
    position:static;
    width:100%;
    height:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .box{
    position:static;
    transform:none;
    width:100%;
  }

  .box.clickable:hover{
    transform:scale(1.01);
  }

  .champion{
    position:static;
    transform:none;
    margin:10px auto;
  }
}
</style>
</head>

<body>
<div class="page">
  <div class="title">Best Male Name</div>
  <div class="debug" id="debug">Loading...</div>

  <div class="stage" id="stage">
    <div class="bracket">
      <div class="col c1" id="r1l"></div>
      <div class="col c2" id="r2l"></div>
      <div class="col c3" id="r3l"></div>
      <div class="col c4" id="r4l"></div>

      <div class="champion">Champion</div>

      <div class="col c5" id="r4r"></div>
      <div class="col c6" id="r3r"></div>
      <div class="col c7" id="r2r"></div>
      <div class="col c8" id="r1r"></div>
    </div>
  </div>
</div>

<script>
const { createClient } = supabase;

const supabaseClient = createClient(
  "https://okaprbdbtnyiutztibcs.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rYXByYmRidG55aXV0enRpYmNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMDgyNjgsImV4cCI6MjA4ODg4NDI2OH0.8tfmypajrsLVbrD3-PUwkJvrM1h9aQ8UN2IP3btoNLE"
);

const COL_HEIGHT = 650;

function centers(count, height){
  const step = height / count;
  const out = [];
  for(let i = 0; i < count; i++){
    out.push(i * step + step / 2);
  }
  return out;
}

const roundPos = {
  r1: centers(8, COL_HEIGHT), // 8 jugadores
  r2: centers(4, COL_HEIGHT), // 4 ganadores
  r3: centers(2, COL_HEIGHT), // 2
  r4: centers(1, COL_HEIGHT)  // 1 finalista
};

function pct(v1, v2){
  const total = (v1 || 0) + (v2 || 0);
  if(total <= 0) return [50, 50];
  return [
    Math.round((v1 * 100) / total),
    Math.round((v2 * 100) / total)
  ];
}

function fitStage(){
  const stage = document.getElementById("stage");
  const designWidth = 1820;
  const designHeight = 900;

  if(window.innerWidth <= 900){
    stage.style.transform = "none";
    return;
  }

  const availableWidth = window.innerWidth - 24;
  const availableHeight = window.innerHeight - 24;

  const scale = Math.min(
    availableWidth / designWidth,
    availableHeight / designHeight,
    1
  );

  stage.style.transform = `translate(-50%, -50%) scale(${scale})`;
}

function makeBox(text, percentText = "", clickable = false, href = ""){
  const div = document.createElement("div");

  if(!text || text === "TBD"){
    div.className = "box empty";
    div.textContent = "TBD";
    return div;
  }

  div.className = clickable ? "box clickable" : "box";

  const name = document.createElement("span");
  name.className = "name";
  name.textContent = text;

  const pctEl = document.createElement("span");
  pctEl.className = "percent";
  pctEl.textContent = percentText;

  div.appendChild(name);
  div.appendChild(pctEl);

  if(clickable && href){
    div.onclick = () => {
      window.location.href = href;
    };
  }

  return div;
}

function renderColumn(containerId, items, positions){
  const container = document.getElementById(containerId);
  container.innerHTML = "";

  items.forEach((item, idx) => {
    const box = item.box;
    box.style.top = positions[idx] + "px";
    container.appendChild(box);
  });
}

async function loadBracket(){
  const debug = document.getElementById("debug");

  const { data: matches, error: matchesError } = await supabaseClient
    .from("matches")
    .select("*")
    .eq("tournament_id", 1)
    .order("id");

  const { data: participants, error: participantsError } = await supabaseClient
    .from("participants")
    .select("id,name");

  if(matchesError){
    debug.textContent = "Matches error: " + matchesError.message;
    return;
  }

  if(participantsError){
    debug.textContent = "Participants error: " + participantsError.message;
    return;
  }

  const names = {};
  (participants || []).forEach(p => {
    names[p.id] = p.name;
  });

  debug.textContent =
    "Matches loaded: " + (matches ? matches.length : 0) +
    " | Participants loaded: " + (participants ? participants.length : 0);

  if(!matches || matches.length === 0){
    return;
  }

  /* Tu esquema real de 16:
     ids 1..8   = primera ronda
     ids 9..12  = segunda ronda
     ids 13..14 = semifinales
     id 15      = final
  */
  const r1 = matches.slice(0, 8);
  const r2 = matches.slice(8, 12);
  const r3 = matches.slice(12, 14);
  const r4 = matches.slice(14, 15);

  const r1lMatches = r1.slice(0, 4);
  const r1rMatches = r1.slice(4, 8);

  const r2lMatches = r2.slice(0, 2);
  const r2rMatches = r2.slice(2, 4);

  const r3lMatches = r3.slice(0, 1);
  const r3rMatches = r3.slice(1, 2);

  const finalMatch = r4[0] || null;

  const r1l = [];
  const r1r = [];

  r1lMatches.forEach(m => {
    const p = pct(m.votes1 || 1, m.votes2 || 1);
    r1l.push({
      box: makeBox(
        names[m.player1_id] || "TBD",
        p[0] + "%",
        !!(m.player1_id && m.player2_id),
        `duel.html?match=${m.id}`
      )
    });
    r1l.push({
      box: makeBox(
        names[m.player2_id] || "TBD",
        p[1] + "%",
        !!(m.player1_id && m.player2_id),
        `duel.html?match=${m.id}`
      )
    });
  });

  r1rMatches.forEach(m => {
    const p = pct(m.votes1 || 1, m.votes2 || 1);
    r1r.push({
      box: makeBox(
        names[m.player1_id] || "TBD",
        p[0] + "%",
        !!(m.player1_id && m.player2_id),
        `duel.html?match=${m.id}`
      )
    });
    r1r.push({
      box: makeBox(
        names[m.player2_id] || "TBD",
        p[1] + "%",
        !!(m.player1_id && m.player2_id),
        `duel.html?match=${m.id}`
      )
    });
  });

  function mapFutureRound(matchArray){
    return matchArray.map(m => {
      const hasBoth = !!(m.player1_id && m.player2_id);
      const p = pct(m.votes1 || 1, m.votes2 || 1);
      const label =
        hasBoth
          ? `${names[m.player1_id]} vs ${names[m.player2_id]}`
          : "TBD";

      return {
        box: makeBox(
          label,
          hasBoth ? `${p[0]}%` : "",
          hasBoth,
          hasBoth ? `duel.html?match=${m.id}` : ""
        )
      };
    });
  }

  const r2l = mapFutureRound(r2lMatches);
  const r2r = mapFutureRound(r2rMatches);
  const r3l = mapFutureRound(r3lMatches);
  const r3r = mapFutureRound(r3rMatches);

  const leftFinalist =
    finalMatch && finalMatch.player1_id
      ? names[finalMatch.player1_id]
      : "TBD";

  const rightFinalist =
    finalMatch && finalMatch.player2_id
      ? names[finalMatch.player2_id]
      : "TBD";

  const r4l = [{
    box: makeBox(leftFinalist, "", false, "")
  }];

  const r4r = [{
    box: makeBox(rightFinalist, "", false, "")
  }];

  renderColumn("r1l", r1l, roundPos.r1);
  renderColumn("r2l", r2l, roundPos.r2);
  renderColumn("r3l", r3l, roundPos.r3);
  renderColumn("r4l", r4l, roundPos.r4);

  renderColumn("r4r", r4r, roundPos.r4);
  renderColumn("r3r", r3r, roundPos.r3);
  renderColumn("r2r", r2r, roundPos.r2);
  renderColumn("r1r", r1r, roundPos.r1);

  fitStage();
}

window.addEventListener("resize", fitStage);
loadBracket();
</script>
</body>
</html>
