<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Best Male Name</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#3c3ccf,#000);
color:white;
}

.title{
text-align:center;
font-size:34px;
margin-top:30px;
}

.bracket{
width:1600px;
margin:60px auto;
display:grid;
grid-template-columns:repeat(9,1fr);
align-items:center;
}

.round{
display:flex;
flex-direction:column;
justify-content:space-around;
}

.box{
background:linear-gradient(#eee,#bbb);
color:black;
border-radius:12px;
padding:8px 12px;
margin:10px;
display:flex;
justify-content:space-between;
cursor:pointer;
min-width:150px;
}

.box.empty{
opacity:.4;
cursor:default;
justify-content:center;
}

.percent{
font-weight:bold;
}

.champion{
background:gold;
color:black;
padding:20px;
border-radius:16px;
text-align:center;
font-weight:bold;
}

</style>

</head>


<body>

<div class="title">Best Male Name</div>

<div class="bracket">

<div class="round" id="r1l"></div>
<div class="round" id="r2l"></div>
<div class="round" id="r3l"></div>
<div class="round" id="r4l"></div>

<div class="champion">Champion</div>

<div class="round" id="r4r"></div>
<div class="round" id="r3r"></div>
<div class="round" id="r2r"></div>
<div class="round" id="r1r"></div>

</div>


<script>

const { createClient } = supabase

const supabaseClient = createClient(
"https://okaprbdbtnyiutztibcs.supabase.co",
"TU_ANON_KEY"
)


function percent(v1,v2){

v1 = v1 || 1
v2 = v2 || 1

const total = v1 + v2

return [
Math.round(v1*100/total),
Math.round(v2*100/total)
]

}


function createBox(name,pct,matchId){

const div=document.createElement("div")

if(name==="TBD"){

div.className="box empty"
div.innerText="TBD"

}else{

div.className="box"

div.innerHTML=`
<span>${name}</span>
<span class="percent">${pct}%</span>
`

div.onclick=()=>{
window.location=`duel.html?match=${matchId}`
}

}

return div

}



async function loadBracket(){

/* matches */

const { data:matches } = await supabaseClient
.from("matches")
.select("*")
.eq("tournament_id",1)
.order("round",{ascending:true})
.order("position",{ascending:true})


/* players */

const { data:players } = await supabaseClient
.from("participants")
.select("id,name")


const safeMatches = matches || []
const safePlayers = players || []


/* map nombres */

const names={}

safePlayers.forEach(p=>{
names[p.id]=p.name
})


function getName(id){
return names[id] || "TBD"
}



/* separar rondas */

const round1 = safeMatches.filter(m=>Number(m.round)===1)
const round2 = safeMatches.filter(m=>Number(m.round)===2)
const round3 = safeMatches.filter(m=>Number(m.round)===3)
const round4 = safeMatches.filter(m=>Number(m.round)===4)



/* limpiar */

document.querySelectorAll(".round").forEach(r=>{
r.innerHTML=""
})



/* ROUND 1 izquierda */

round1.slice(0,4).forEach(m=>{

const p = percent(m.votes1,m.votes2)

document.getElementById("r1l")
.appendChild(createBox(getName(m.player1_id),p[0],m.id))

document.getElementById("r1l")
.appendChild(createBox(getName(m.player2_id),p[1],m.id))

})



/* ROUND 1 derecha */

round1.slice(4,8).forEach(m=>{

const p = percent(m.votes1,m.votes2)

document.getElementById("r1r")
.appendChild(createBox(getName(m.player1_id),p[0],m.id))

document.getElementById("r1r")
.appendChild(createBox(getName(m.player2_id),p[1],m.id))

})



/* ROUND 2 */

for(let i=0;i<4;i++){

document.getElementById("r2l").appendChild(createBox("TBD"))
document.getElementById("r2r").appendChild(createBox("TBD"))

}



/* ROUND 3 */

for(let i=0;i<2;i++){

document.getElementById("r3l").appendChild(createBox("TBD"))
document.getElementById("r3r").appendChild(createBox("TBD"))

}



/* FINAL */

document.getElementById("r4l").appendChild(createBox("TBD"))
document.getElementById("r4r").appendChild(createBox("TBD"))

}



loadBracket()

</script>


</body>
</html>
