<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Best Male Name</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#3c3ccf,#000);
color:white;
overflow:hidden;
}

.title{
text-align:center;
font-size:34px;
margin-top:20px;
}

.bracket{
position:relative;
width:1500px;
height:800px;
margin:40px auto;
}

.col{
position:absolute;
display:flex;
flex-direction:column;
justify-content:space-around;
height:100%;
}

.r1{ left:0px; width:200px; }
.r2{ left:250px; width:200px; }
.r3{ left:500px; width:200px; }
.r4{ left:750px; width:200px; }

.r4r{ right:750px; width:200px; }
.r3r{ right:500px; width:200px; }
.r2r{ right:250px; width:200px; }
.r1r{ right:0px; width:200px; }

.box{
background:linear-gradient(#eee,#bbb);
color:black;
border-radius:12px;
padding:10px;
margin:6px;
display:flex;
justify-content:space-between;
cursor:pointer;
}

.box.empty{
opacity:.4;
cursor:default;
justify-content:center;
}

.percent{
font-weight:bold;
}

.champion{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
background:gold;
padding:15px 40px;
border-radius:20px;
color:black;
font-weight:bold;
}

</style>
</head>

<body>

<div class="title">Best Male Name</div>

<div class="bracket">

<div class="col r1" id="r1l"></div>
<div class="col r2" id="r2l"></div>
<div class="col r3" id="r3l"></div>
<div class="col r4" id="r4l"></div>

<div class="champion">Champion</div>

<div class="col r4r" id="r4r"></div>
<div class="col r3r" id="r3r"></div>
<div class="col r2r" id="r2r"></div>
<div class="col r1r" id="r1r"></div>

</div>

<script>

const { createClient } = supabase

const supabaseClient = createClient(
"https://okaprbdbtnyiutztibcs.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rYXByYmRidG55aXV0enRpYmNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMDgyNjgsImV4cCI6MjA4ODg4NDI2OH0.8tfmypajrsLVbrD3-PUwkJvrM1h9aQ8UN2IP3btoNLE"
)

function percent(v1,v2){

v1=v1||1
v2=v2||1

const total=v1+v2

return [
Math.round(v1*100/total),
Math.round(v2*100/total)
]

}

function playerBox(name,perc,matchId){

const div=document.createElement("div")

if(name==="TBD"){

div.className="box empty"
div.innerText="TBD"

}else{

div.className="box"

div.innerHTML=`
<span>${name}</span>
<span class="percent">${perc}%</span>
`

div.onclick=()=>{
window.location=`duel.html?match=${matchId}`
}

}

return div

}

async function loadBracket(){

const { data:matches } = await supabaseClient
.from("matches")
.select("*")
.eq("tournament_id",1)
.order("id")

const { data:players } = await supabaseClient
.from("participants")
.select("*")

const names={}
players.forEach(p=>names[p.id]=p.name)

function name(id){
return names[id]||"TBD"
}

function perc(m){
return percent(m.votes1,m.votes2)
}

/* rounds */

const r1=matches.slice(0,8)
const r2=matches.slice(8,12)
const r3=matches.slice(12,14)
const r4=matches.slice(14,15)

/* LEFT */

const r1l=r1.slice(0,4)
const r1r=r1.slice(4,8)

const r2l=r2.slice(0,2)
const r2r=r2.slice(2,4)

const r3l=r3.slice(0,1)
const r3r=r3.slice(1,2)

const final=r4[0]

/* clear */

document.querySelectorAll(".col").forEach(c=>c.innerHTML="")

/* ROUND 1 */

r1l.forEach(m=>{
const p=perc(m)
document.getElementById("r1l").appendChild(playerBox(name(m.player1_id),p[0],m.id))
document.getElementById("r1l").appendChild(playerBox(name(m.player2_id),p[1],m.id))
})

r1r.forEach(m=>{
const p=perc(m)
document.getElementById("r1r").appendChild(playerBox(name(m.player1_id),p[0],m.id))
document.getElementById("r1r").appendChild(playerBox(name(m.player2_id),p[1],m.id))
})

/* ROUND 2 */

r2l.forEach(m=>{
document.getElementById("r2l").appendChild(playerBox(name(m.player1_id)+" vs "+name(m.player2_id),"",m.id))
})

r2r.forEach(m=>{
document.getElementById("r2r").appendChild(playerBox(name(m.player1_id)+" vs "+name(m.player2_id),"",m.id))
})

/* ROUND 3 */

r3l.forEach(m=>{
document.getElementById("r3l").appendChild(playerBox(name(m.player1_id)+" vs "+name(m.player2_id),"",m.id))
})

r3r.forEach(m=>{
document.getElementById("r3r").appendChild(playerBox(name(m.player1_id)+" vs "+name(m.player2_id),"",m.id))
})

/* FINAL */

document.getElementById("r4l").appendChild(
playerBox(name(final?.player1_id),"",final?.id)
)

document.getElementById("r4r").appendChild(
playerBox(name(final?.player2_id),"",final?.id)
)

}

loadBracket()

</script>

</body>
</html>
