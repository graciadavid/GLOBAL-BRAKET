<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bracket</title>

<style>

body{
margin:0;
background:linear-gradient(#3c3ccf,#000);
font-family:Arial;
overflow:hidden;
color:white;
}

/* SCALING STAGE */

.stage{
position:absolute;
left:50%;
top:50%;
transform-origin:center;
}

/* BRACKET GRID */

.bracket{
width:1600px;
height:900px;

display:grid;
grid-template-columns:
180px 180px 180px 180px 220px 180px 180px 180px 180px;

align-items:center;
}

/* ROUNDS */

.round{
position:relative;
height:800px;
}

/* MATCH */

.match{
position:absolute;
width:160px;
transform:translateY(-50%);
}

/* PLAYER */

.player{
background:linear-gradient(#eee,#bbb);
color:black;
border-radius:8px;
padding:5px 8px;
margin:3px 0;
display:flex;
justify-content:space-between;
font-size:12px;
}

/* CHAMPION */

.champion{
background:gold;
padding:18px 40px;
border-radius:30px;
color:black;
font-weight:bold;
text-align:center;
}

/* TITLE */

.title{
position:absolute;
top:20px;
width:100%;
text-align:center;
font-size:36px;
}

</style>
</head>

<body>

<div class="title">BEST MALE NAME</div>

<div class="stage" id="stage">

<div class="bracket">

<div class="round" id="r1L"></div>
<div class="round" id="r2L"></div>
<div class="round" id="r3L"></div>
<div class="round" id="r4L"></div>

<div style="display:flex;align-items:center;justify-content:center;">
<div class="champion">Champion</div>
</div>

<div class="round" id="r4R"></div>
<div class="round" id="r3R"></div>
<div class="round" id="r2R"></div>
<div class="round" id="r1R"></div>

</div>
</div>

<script>

/* PLAYERS */

const players = [
"Alejandro","Daniel","Mateo","Lucas","Hugo","Adrian","Pablo","Bruno",
"Diego","Javier","Carlos","Alvaro","Marco","Nicolas","Ivan","Sergio",
"Gabriel","Leo","Mario","Andres","David","Eric","Oscar","Raul",
"Martin","Joel","Samuel","Enzo","Tomas","Gonzalo","Luis","Ruben"
]

/* CREATE MATCH */

function createMatch(p1,p2){

return `
<div class="match">
<div class="player">${p1}<span>50%</span></div>
<div class="player">${p2}<span>50%</span></div>
</div>
`

}

/* POSITIONS */

function centers(count,height){

let space = height/count
let arr=[]

for(let i=0;i<count;i++)
arr.push(space*i + space/2)

return arr

}

/* RENDER ROUND */

function renderRound(id,matches){

let container = document.getElementById(id)
let h=800
let c=centers(matches.length,h)

matches.forEach((m,i)=>{

let el=document.createElement("div")
el.className="match"
el.style.top=c[i]+"px"

el.innerHTML=m

container.appendChild(el)

})

}

/* BUILD */

let left=players.slice(0,16)
let right=players.slice(16)

/* R1 */

let r1L=[]
let r1R=[]

for(let i=0;i<16;i+=2)
r1L.push(createMatch(left[i],left[i+1]))

for(let i=0;i<16;i+=2)
r1R.push(createMatch(right[i],right[i+1]))

renderRound("r1L",r1L)
renderRound("r1R",r1R)

/* EMPTY ROUNDS */

function empty(count){
return new Array(count).fill(`<div class="player">&nbsp;</div>`)
}

renderRound("r2L",empty(4))
renderRound("r3L",empty(2))
renderRound("r4L",empty(1))

renderRound("r2R",empty(4))
renderRound("r3R",empty(2))
renderRound("r4R",empty(1))

/* SCALE */

function scale(){

let w=1600
let h=900

let s=Math.min(
window.innerWidth/w,
window.innerHeight/h
)

document.getElementById("stage").style.transform=
`translate(-50%,-50%) scale(${s})`

}

window.addEventListener("resize",scale)
scale()

</script>

</body>
</html>
