<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Best Male Name</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#3c3ccf,#000);
color:white;
}

.title{
text-align:center;
font-size:36px;
padding:30px;
}

.bracket{
display:flex;
justify-content:center;
align-items:center;
gap:50px;
height:80vh;
}

.round{
display:flex;
flex-direction:column;
justify-content:space-around;
height:600px;
}

.player{
display:flex;
justify-content:space-between;
align-items:center;
width:200px;
padding:10px;
border-radius:12px;
background:linear-gradient(#eee,#bbb);
color:black;
margin:4px;
cursor:pointer;
}

.percent{
font-weight:bold;
}

.match{
margin-bottom:15px;
}

.tbd{
opacity:.4;
cursor:default;
}

.final{
background:gold;
padding:16px;
border-radius:20px;
color:black;
font-weight:bold;
text-align:center;
width:180px;
}

</style>
</head>

<body>

<div class="title">Best Male Name</div>

<div class="bracket">

<div class="round" id="left1"></div>
<div class="round" id="left2"></div>
<div class="round" id="left3"></div>
<div class="round" id="left4"></div>

<div class="final">Champion</div>

<div class="round" id="right4"></div>
<div class="round" id="right3"></div>
<div class="round" id="right2"></div>
<div class="round" id="right1"></div>

</div>

<script>

const { createClient } = supabase

const supabaseClient = createClient(
"https://okaprbdbtnyiutztibcs.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rYXByYmRidG55aXV0enRpYmNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMDgyNjgsImV4cCI6MjA4ODg4NDI2OH0.8tfmypajrsLVbrD3-PUwkJvrM1h9aQ8UN2IP3btoNLE"
)

async function vote(matchId,player){

const { data } = await supabaseClient
.from("matches")
.select("*")
.eq("id",matchId)
.single()

let v1=data.votes1
let v2=data.votes2

if(player==1) v1++
if(player==2) v2++

await supabaseClient
.from("matches")
.update({votes1:v1,votes2:v2})
.eq("id",matchId)

loadBracket()

}

function percent(v1,v2){

const total=v1+v2
return [
Math.round(v1*100/total),
Math.round(v2*100/total)
]

}

function createPlayer(name,perc,click){

const div=document.createElement("div")

div.className="player"

div.innerHTML=`
<span>${name}</span>
<span class="percent">${perc}%</span>
`

div.onclick=click

return div

}

async function loadBracket(){

document.getElementById("left1").innerHTML=""
document.getElementById("right1").innerHTML=""

const { data: matches } = await supabaseClient
.from("matches")
.select("*")
.eq("tournament_id",1)
.order("id")

const { data: players } = await supabaseClient
.from("participants")
.select("*")

const names={}
players.forEach(p=>names[p.id]=p.name)

const round1=matches.slice(0,8)

const left=round1.slice(0,4)
const right=round1.slice(4,8)

function render(matches,container){

const el=document.getElementById(container)

matches.forEach(m=>{

const p=percent(m.votes1,m.votes2)

const match=document.createElement("div")
match.className="match"

match.appendChild(createPlayer(names[m.player1_id],p[0],()=>vote(m.id,1)))
match.appendChild(createPlayer(names[m.player2_id],p[1],()=>vote(m.id,2)))

el.appendChild(match)

})

}

render(left,"left1")
render(right,"right1")

}

loadBracket()

</script>

</body>
</html>
