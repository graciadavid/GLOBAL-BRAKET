<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Best Male Name</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#3c3ccf,#000);
color:white;
}

.title{
text-align:center;
font-size:36px;
padding:30px;
}

.bracket{
display:flex;
justify-content:center;
align-items:center;
gap:40px;
height:80vh;
}

.round{
display:flex;
flex-direction:column;
justify-content:space-around;
height:500px;
}

.box{
width:160px;
padding:10px;
border-radius:10px;
background:linear-gradient(#eee,#bbb);
color:black;
text-align:center;
margin:5px;
font-size:14px;
}

.tbd{
opacity:.4;
}

.final{
background:gold;
padding:14px;
border-radius:20px;
color:black;
font-weight:bold;
text-align:center;
width:180px;
}

</style>
</head>

<body>

<div class="title">Best Male Name</div>

<div class="bracket">

<div class="round" id="left1"></div>
<div class="round" id="left2"></div>
<div class="round" id="left3"></div>
<div class="round" id="left4"></div>

<div class="final">Champion</div>

<div class="round" id="right4"></div>
<div class="round" id="right3"></div>
<div class="round" id="right2"></div>
<div class="round" id="right1"></div>

</div>

<script>

const { createClient } = supabase

const supabaseClient = createClient(
"https://okaprbdbtnyiutztibcs.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rYXByYmRidG55aXV0enRpYmNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMDgyNjgsImV4cCI6MjA4ODg4NDI2OH0.8tfmypajrsLVbrD3-PUwkJvrM1h9aQ8UN2IP3btoNLE"
)

async function loadBracket(){

const { data: matches } = await supabaseClient
.from("matches")
.select("*")
.eq("tournament_id",1)
.order("id")

const { data: players } = await supabaseClient
.from("participants")
.select("*")

const names = {}

players.forEach(p=>{
names[p.id]=p.name
})

const round1 = matches.slice(0,8)

const left = round1.slice(0,4)
const right = round1.slice(4,8)

function create(name){

const div=document.createElement("div")

div.className="box"

if(!name){
div.classList.add("tbd")
div.innerText="TBD"
}else{
div.innerText=name
}

return div
}

function render(matches,container){

const el=document.getElementById(container)

matches.forEach(m=>{

el.appendChild(create(names[m.player1_id]))
el.appendChild(create(names[m.player2_id]))

})

}

render(left,"left1")
render(right,"right1")

function empty(container,n){

const el=document.getElementById(container)

for(let i=0;i<n;i++){

const d=document.createElement("div")
d.className="box tbd"
d.innerText="TBD"

el.appendChild(d)

}

}

empty("left2",4)
empty("left3",2)
empty("left4",1)

empty("right2",4)
empty("right3",2)
empty("right4",1)

}

loadBracket()

</script>

</body>
</html>
