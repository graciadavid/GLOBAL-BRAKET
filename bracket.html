<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Global Bracket</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:40px;
}

#title{
font-size:28px;
margin-bottom:20px;
}

#bracket{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.round{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.match{
border:1px solid #ddd;
padding:10px;
margin-bottom:10px;
border-radius:6px;
background:#fafafa;
}

.player{
display:block;
padding:4px 0;
}

</style>

</head>

<body>

<h1 id="title">Loading bracket...</h1>

<div id="bracket">

<div class="round" id="round1">
<h3>Round 1</h3>
</div>

<div class="round" id="round2">
<h3>Quarterfinals</h3>
</div>

<div class="round" id="round3">
<h3>Semifinals</h3>
</div>

<div class="round" id="round4">
<h3>Final</h3>
</div>

</div>

<script>

const supabase = window.supabase.createClient(
"https://okaprbdbtnyiutztibcs.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rYXByYmRidG55aXV0enRpYmNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMDgyNjgsImV4cCI6MjA4ODg4NDI2OH0.8tfmypajrsLVbrD3-PUwkJvrM1h9aQ8UN2IP3btoNLE"
);

function getCompetition(){

const params = new URLSearchParams(window.location.search);
return params.get("competition");

}

function getTodayDate(){

const today = new Date();

const yyyy = today.getFullYear();
const mm = String(today.getMonth()+1).padStart(2,"0");
const dd = String(today.getDate()).padStart(2,"0");

return `${yyyy}-${mm}-${dd}`;

}

async function loadTournament(){

const competition = getCompetition();
const date = getTodayDate();

const tournamentName = `${competition}-${date}`;

document.getElementById("title").innerText = tournamentName;

const { data, error } = await supabase
.from("tournaments")
.select("*")
.eq("name", tournamentName)
.single();

if(error){

document.getElementById("title").innerText="Tournament not found";
console.log(error);
return;

}

loadMatches(data.id);

}

async function loadMatches(tournamentId){

const { data, error } = await supabase
.from("matches")
.select("*")
.eq("competition_id", tournamentId)
.order("round", {ascending:true})
.order("position", {ascending:true});

if(error){

console.log(error);
return;

}

renderBracket(data);

}

function renderBracket(matches){

matches.forEach(match=>{

const div = document.createElement("div");
div.className="match";

div.innerHTML=`
<span class="player">${match.player1_id ?? "TBD"}</span>
<span class="player">${match.player2_id ?? "TBD"}</span>
`;

const roundDiv = document.getElementById(`round${match.round}`);

if(roundDiv){
roundDiv.appendChild(div);
}

});

}

loadTournament();

</script>

</body>
</html>
