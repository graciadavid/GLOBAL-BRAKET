<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Bracket</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#3c3ccf,#000);
color:white;
}

.title{
text-align:center;
font-size:40px;
padding:30px;
}

.bracket{
display:flex;
justify-content:center;
gap:40px;
padding:40px;
}

.round{
display:flex;
flex-direction:column;
gap:20px;
}

.match{
background:white;
color:black;
padding:10px 20px;
border-radius:10px;
text-align:center;
cursor:pointer;
min-width:160px;
}

.match:hover{
background:#eee;
}

.empty{
opacity:.3;
cursor:default;
}

</style>

</head>

<body>

<div class="title">Best Male Name</div>

<div class="bracket">

<div class="round" id="r1l"></div>
<div class="round" id="r2l"></div>
<div class="round" id="r3l"></div>
<div class="round" id="r4l"></div>

<div class="round" id="final"></div>

<div class="round" id="r4r"></div>
<div class="round" id="r3r"></div>
<div class="round" id="r2r"></div>
<div class="round" id="r1r"></div>

</div>

<script>

/* SUPABASE */

const { createClient } = supabase

const supabaseClient = createClient(
"https://okaprbdbtnyiutztibcs.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
)

/* LOAD DATA */

async function loadBracket(){

const { data:matches } = await supabaseClient
.from("matches")
.select("*")

const { data:participants } = await supabaseClient
.from("participants")
.select("*")

/* MAP PLAYERS */

const players = {}

participants.forEach(p=>{
players[p.id] = p.name
})

/* ROUND 1 */

const r1 = matches.filter(m=>m.round_number==1)

const left = r1.slice(0,4)
const right = r1.slice(4,8)

/* RENDER */

function render(round, container){

container.innerHTML=""

round.forEach(match=>{

const div = document.createElement("div")

if(match.player1_id && match.player2_id){

const name1 = players[match.player1_id]
const name2 = players[match.player2_id]

div.className="match"

div.innerText = name1 + " vs " + name2

div.onclick=()=>{

window.location.href="/names/"+match.seo_slug

}

}else{

div.className="match empty"
div.innerText="TBD"

}

container.appendChild(div)

})

}

render(left, document.getElementById("r1l"))
render(right, document.getElementById("r1r"))

}

loadBracket()

</script>

</body>

</html>
