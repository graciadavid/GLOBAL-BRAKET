<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bracket</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#3c3ccf,#000);
overflow:hidden;
color:white;
}

.title{
position:absolute;
top:20px;
width:100%;
text-align:center;
font-size:36px;
}

.stage{
position:absolute;
left:50%;
top:50%;
transform-origin:center;
}

/* GRID */

.bracket{

width:1800px;
height:900px;

display:grid;

grid-template-columns:
140px 140px 140px 140px 140px
200px
140px 140px 140px 140px 140px;

align-items:center;

}

/* COLUMN */

.col{
position:relative;
height:800px;
}

/* PLAYER BOX */

.player{

position:absolute;
width:120px;

background:linear-gradient(#eee,#bbb);
color:black;

border-radius:8px;

padding:6px 8px;

display:flex;
justify-content:space-between;

font-size:12px;

transform:translateY(-50%);

}

.clickable{
cursor:pointer;
}

.clickable:hover{
background:white;
}

/* CHAMPION */

.champion{

background:gold;
color:black;

padding:18px 40px;

border-radius:30px;

font-weight:bold;
text-align:center;

}

</style>
</head>

<body>

<div class="title">BEST MALE NAME</div>

<div class="stage" id="stage">

<div class="bracket">

<div class="col" id="c1"></div>
<div class="col" id="c2"></div>
<div class="col" id="c3"></div>
<div class="col" id="c4"></div>
<div class="col" id="c5"></div>

<div style="display:flex;align-items:center;justify-content:center;">
<div class="champion">Champion</div>
</div>

<div class="col" id="c7"></div>
<div class="col" id="c8"></div>
<div class="col" id="c9"></div>
<div class="col" id="c10"></div>
<div class="col" id="c11"></div>

</div>
</div>

<script>

/* PLAYERS */

const players=[

"Alejandro","Daniel","Mateo","Lucas","Hugo","Adrian","Pablo","Bruno",
"Diego","Javier","Carlos","Alvaro","Marco","Nicolas","Ivan","Sergio",

"Gabriel","Leo","Mario","Andres","David","Eric","Oscar","Raul",
"Martin","Joel","Samuel","Enzo","Tomas","Gonzalo","Luis","Ruben"

]

/* OPEN DUEL */

function openDuel(a,b){

window.location.href=
"duel.html?name1="+encodeURIComponent(a)+"&name2="+encodeURIComponent(b)

}

/* CREATE PLAYER */

function playerBox(name,opponent,top){

let div=document.createElement("div")

div.className="player"

div.style.top=top+"px"

div.innerHTML=`${name}<span>50%</span>`

if(opponent){

div.classList.add("clickable")

div.onclick=()=>openDuel(name,opponent)

}

return div

}

/* CALCULATE POSITIONS */

function positions(count){

let height=800
let space=height/count

let arr=[]

for(let i=0;i<count;i++)
arr.push(space*i + space/2)

return arr

}

/* RENDER COLUMN */

function renderColumn(id,names,opponents){

let col=document.getElementById(id)

let pos=positions(names.length)

names.forEach((name,i)=>{

let opponent=opponents?opponents[i]:null

col.appendChild(playerBox(name,opponent,pos[i]))

})

}

/* LEFT SIDE */

let left=players.slice(0,16)

/* RIGHT SIDE */

let right=players.slice(16)

/* R1 */

renderColumn("c1",left,[
"Daniel","Alejandro",
"Lucas","Mateo",
"Adrian","Hugo",
"Bruno","Pablo",
"Javier","Diego",
"Alvaro","Carlos",
"Nicolas","Marco",
"Sergio","Ivan"
])

renderColumn("c11",right,[
"Leo","Gabriel",
"Andres","Mario",
"Eric","David",
"Raul","Oscar",
"Joel","Martin",
"Enzo","Samuel",
"Gonzalo","Tomas",
"Ruben","Luis"
])

/* EMPTY FUTURE ROUNDS */

function empty(count){

let arr=[]

for(let i=0;i<count;i++)
arr.push("")

return arr

}

renderColumn("c2",empty(8))
renderColumn("c3",empty(4))
renderColumn("c4",empty(2))
renderColumn("c5",empty(1))

renderColumn("c7",empty(1))
renderColumn("c8",empty(2))
renderColumn("c9",empty(4))
renderColumn("c10",empty(8))

/* SCALE */

function scale(){

let w=1800
let h=900

let s=Math.min(

window.innerWidth/w,
window.innerHeight/h

)

document.getElementById("stage").style.transform=
`translate(-50%,-50%) scale(${s})`

}

window.addEventListener("resize",scale)

scale()

</script>

</body>
</html>
