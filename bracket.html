<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Best Male Name</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#3c3ccf,#000);
color:white;
overflow:hidden;
}

.title{
text-align:center;
font-size:34px;
margin-top:20px;
}

.bracket{
width:1400px;
height:750px;
margin:40px auto;
display:grid;
grid-template-columns:repeat(9,1fr);
align-items:center;
}

.round{
display:flex;
flex-direction:column;
justify-content:space-around;
height:100%;
}

.box{
background:linear-gradient(#eee,#bbb);
color:black;
padding:8px 12px;
border-radius:10px;
margin:6px;
display:flex;
justify-content:space-between;
cursor:pointer;
}

.box.empty{
opacity:.4;
cursor:default;
justify-content:center;
}

.percent{
font-weight:bold;
}

.champion{
background:gold;
color:black;
padding:16px 28px;
border-radius:18px;
font-weight:bold;
text-align:center;
}

</style>
</head>

<body>

<div class="title">Best Male Name</div>

<div class="bracket">

<div class="round" id="r1l"></div>
<div class="round" id="r2l"></div>
<div class="round" id="r3l"></div>
<div class="round" id="r4l"></div>

<div class="champion">Champion</div>

<div class="round" id="r4r"></div>
<div class="round" id="r3r"></div>
<div class="round" id="r2r"></div>
<div class="round" id="r1r"></div>

</div>

<script>

const { createClient } = supabase

const supabaseClient = createClient(
"https://okaprbdbtnyiutztibcs.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rYXByYmRidG55aXV0enRpYmNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMDgyNjgsImV4cCI6MjA4ODg4NDI2OH0.8tfmypajrsLVbrD3-PUwkJvrM1h9aQ8UN2IP3btoNLE"
)

function percent(v1,v2){

v1=v1||1
v2=v2||1

const total=v1+v2

return [
Math.round(v1*100/total),
Math.round(v2*100/total)
]

}

function box(name,perc,matchId){

const div=document.createElement("div")

if(name==="TBD"){

div.className="box empty"
div.innerText="TBD"

}else{

div.className="box"

div.innerHTML=`
<span>${name}</span>
<span class="percent">${perc}%</span>
`

div.onclick=()=>{
window.location=`duel.html?match=${matchId}`
}

}

return div

}

async function loadBracket(){

const { data:matches } = await supabaseClient
.from("matches")
.select("*")
.eq("tournament_id",1)
.order("id")

const { data:players } = await supabaseClient
.from("participants")
.select("*")

const names={}
players.forEach(p=>names[p.id]=p.name)

function name(id){
return names[id] || "TBD"
}

function winner(m){

if(!m.player1_id || !m.player2_id) return null

if((m.votes1||1) > (m.votes2||1)) return m.player1_id
if((m.votes2||1) > (m.votes1||1)) return m.player2_id

return null
}

function clear(){
document.querySelectorAll(".round").forEach(r=>r.innerHTML="")
}

clear()

const r1 = matches.slice(0,8)
const r2 = matches.slice(8,12)
const r3 = matches.slice(12,14)
const r4 = matches.slice(14,15)

/* ROUND 1 */

r1.slice(0,4).forEach(m=>{
const p=percent(m.votes1,m.votes2)
document.getElementById("r1l").appendChild(box(name(m.player1_id),p[0],m.id))
document.getElementById("r1l").appendChild(box(name(m.player2_id),p[1],m.id))
})

r1.slice(4,8).forEach(m=>{
const p=percent(m.votes1,m.votes2)
document.getElementById("r1r").appendChild(box(name(m.player1_id),p[0],m.id))
document.getElementById("r1r").appendChild(box(name(m.player2_id),p[1],m.id))
})

/* ROUND 2 */

r2.slice(0,2).forEach(()=>{
document.getElementById("r2l").appendChild(box("TBD"))
})

r2.slice(2,4).forEach(()=>{
document.getElementById("r2r").appendChild(box("TBD"))
})

/* ROUND 3 */

r3.slice(0,1).forEach(()=>{
document.getElementById("r3l").appendChild(box("TBD"))
})

r3.slice(1,2).forEach(()=>{
document.getElementById("r3r").appendChild(box("TBD"))
})

/* FINAL */

document.getElementById("r4l").appendChild(box("TBD"))
document.getElementById("r4r").appendChild(box("TBD"))

}

loadBracket()

</script>

</body>
</html>
