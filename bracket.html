<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Bracket</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#3c3ccf,#000);
color:white;
}

.title{
text-align:center;
font-size:40px;
padding:30px;
}

.bracket{
display:flex;
justify-content:center;
gap:60px;
padding:40px;
}

.round{
display:flex;
flex-direction:column;
gap:20px;
}

.match{
background:white;
color:black;
padding:10px 20px;
border-radius:10px;
cursor:pointer;
text-align:center;
min-width:160px;
}

.match:hover{
background:#eee;
}

.empty{
opacity:.3;
cursor:default;
}

</style>

</head>

<body>

<div class="title">Best Male Name</div>

<div class="bracket" id="bracket"></div>

<script>

/* SUPABASE */

const { createClient } = supabase

const supabaseClient = createClient(
"https://okaprbdbtnyiutztibcs.supabase.co",
"TU_ANON_PUBLIC_KEY"
)

/* LOAD BRACKET */

async function loadBracket(){

const { data:matches } = await supabaseClient
.from("matches")
.select("*")
.order("id")

const { data:participants } = await supabaseClient
.from("participants")
.select("*")

const players = {}

participants.forEach(p=>{
players[p.id] = p.name
})

const rounds = {
1:[],
2:[],
3:[],
4:[]
}

matches.forEach(m=>{
rounds[m.round_number].push(m)
})

const container = document.getElementById("bracket")

for(const r in rounds){

const col = document.createElement("div")
col.className = "round"

rounds[r].forEach(match=>{

const div = document.createElement("div")

if(match.player1_id && match.player2_id){

const name1 = players[match.player1_id]
const name2 = players[match.player2_id]

div.className = "match"

div.innerText = name1 + " vs " + name2

div.onclick = () => {

window.location.href =
"/names/" + match.seo_slug

}

}else{

div.className = "match empty"
div.innerText = "TBD"

}

col.appendChild(div)

})

container.appendChild(col)

}

}

loadBracket()

</script>

</body>

</html>
