<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Bracket</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#3c3ccf,#000);
color:white;
}

.title{
text-align:center;
font-size:28px;
margin-top:20px;
}

.bracket{
width:1400px;
margin:40px auto;
display:grid;
grid-template-columns:repeat(9,1fr);
}

.round{
display:flex;
flex-direction:column;
gap:10px;
}

.box{
background:white;
color:black;
padding:8px;
border-radius:8px;
display:flex;
justify-content:space-between;
cursor:pointer;
}

.box.empty{
opacity:.5;
cursor:default;
justify-content:center;
}

.center{
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

</style>
</head>

<body>

<div class="title" id="title">Loading...</div>

<div class="bracket">

<div class="round" id="r1l"></div>
<div class="round" id="r2l"></div>
<div class="round" id="r3l"></div>
<div class="round" id="r4l"></div>

<div class="center">Champion</div>

<div class="round" id="r4r"></div>
<div class="round" id="r3r"></div>
<div class="round" id="r2r"></div>
<div class="round" id="r1r"></div>

</div>

<script>

const { createClient } = supabase

const supabaseClient = createClient(
"https://okaprbdbtnyiutztibcs.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rYXByYmRidG55aXV0enRpYmNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMDgyNjgsImV4cCI6MjA4ODg4NDI2OH0.8tfmypajrsLVbrD3-PUwkJvrM1h9aQ8UN2IP3btoNLE"
)

function createBox(name,matchId){

const div=document.createElement("div")

if(name==="TBD"){
div.className="box empty"
div.innerText="TBD"
}else{
div.className="box"
div.innerHTML=`<span>${name}</span>`
div.onclick=()=>{
window.location=`duel.html?match=${matchId}`
}
}

return div
}

async function load(){

const params=new URLSearchParams(window.location.search)
const slug=params.get("competition")

if(!slug){
document.getElementById("title").innerText="Missing competition slug"
return
}

document.getElementById("title").innerText=slug

/* buscar competición */

const { data:comp, error } = await supabaseClient
.from("competitions")
.select("*")
.eq("slug",slug)
.limit(1)

if(error){
document.getElementById("title").innerText="DB error: "+error.message
return
}

if(!comp || comp.length===0){
document.getElementById("title").innerText="Competition not found"
return
}

const competitionId=comp[0].id

/* cargar matches */

const { data:matches } = await supabaseClient
.from("matches")
.select("*")
.eq("competition_id",competitionId)

/* cargar participantes */

const { data:players } = await supabaseClient
.from("participants")
.select("id,name")

const names={}
players.forEach(p=>names[p.id]=p.name)

function name(id){
return names[id]||"TBD"
}

/* limpiar */

document.querySelectorAll(".round").forEach(r=>r.innerHTML="")

/* round1 */

const round1=matches.filter(m=>m.round==1)

round1.forEach((m,i)=>{

if(i<4){

document.getElementById("r1l").appendChild(createBox(name(m.player1_id),m.id))
document.getElementById("r1l").appendChild(createBox(name(m.player2_id),m.id))

}else{

document.getElementById("r1r").appendChild(createBox(name(m.player1_id),m.id))
document.getElementById("r1r").appendChild(createBox(name(m.player2_id),m.id))

}

})

/* rondas futuras */

for(let i=0;i<4;i++){
document.getElementById("r2l").appendChild(createBox("TBD"))
document.getElementById("r2r").appendChild(createBox("TBD"))
}

for(let i=0;i<2;i++){
document.getElementById("r3l").appendChild(createBox("TBD"))
document.getElementById("r3r").appendChild(createBox("TBD"))
}

document.getElementById("r4l").appendChild(createBox("TBD"))
document.getElementById("r4r").appendChild(createBox("TBD"))

}

load()

</script>

</body>
</html>
