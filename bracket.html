<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Bracket</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#3c3ccf,#000);
color:white;
}

.title{
text-align:center;
font-size:34px;
margin-top:30px;
}

.bracket{
width:1600px;
margin:60px auto;
display:grid;
grid-template-columns:repeat(9,1fr);
align-items:center;
}

.round{
display:flex;
flex-direction:column;
justify-content:space-around;
}

.box{
background:linear-gradient(#eee,#bbb);
color:black;
border-radius:12px;
padding:8px 12px;
margin:10px;
display:flex;
justify-content:space-between;
cursor:pointer;
}

.box.empty{
opacity:.4;
cursor:default;
justify-content:center;
}

.percent{
font-weight:bold;
}

.champion{
background:gold;
color:black;
padding:20px;
border-radius:16px;
text-align:center;
font-weight:bold;
}

</style>

</head>

<body>

<div class="title" id="title">Loading bracket...</div>

<div class="bracket">

<div class="round" id="r1l"></div>
<div class="round" id="r2l"></div>
<div class="round" id="r3l"></div>
<div class="round" id="r4l"></div>

<div class="champion">Champion</div>

<div class="round" id="r4r"></div>
<div class="round" id="r3r"></div>
<div class="round" id="r2r"></div>
<div class="round" id="r1r"></div>

</div>

<script>

const { createClient } = supabase

const supabaseClient = createClient(
"https://okaprbdbtnyiutztibcs.supabase.co",
"TU_ANON_KEY"
)

function percent(v1,v2){

v1=v1||1
v2=v2||1

const total=v1+v2

return [
Math.round(v1*100/total),
Math.round(v2*100/total)
]

}

function createBox(name,pct,matchId){

const div=document.createElement("div")

if(name==="TBD"){

div.className="box empty"
div.innerText="TBD"

}else{

div.className="box"

div.innerHTML=`
<span>${name}</span>
<span class="percent">${pct}%</span>
`

div.onclick=()=>{
window.location=`duel.html?match=${matchId}`
}

}

return div

}

async function loadBracket(){

/******** leer slug ********/

const params = new URLSearchParams(window.location.search)
const slug = params.get("competition")

console.log("URL slug:", slug)

document.getElementById("title").innerText = slug


/******** buscar competition ********/

const { data, error } = await supabaseClient
.from("competitions")
.select("*")
.eq("slug", slug)

if(error){

console.error(error)
alert("DB error")

return

}

if(!data || data.length === 0){

alert("Competition not found: " + slug)
return

}

const competitionId = data[0].id


/******** cargar matches ********/

const { data:matches } = await supabaseClient
.from("matches")
.select("*")
.eq("competition_id",competitionId)


/******** cargar participantes ********/

const { data:players } = await supabaseClient
.from("participants")
.select("id,name")


const names={}

players.forEach(p=>{
names[p.id]=p.name
})

function getName(id){
return names[id] || "TBD"
}

matches.sort((a,b)=>{

if(a.round===b.round){
return a.position-b.position
}

return a.round-b.round

})

const round1 = matches.filter(m=>m.round==1)

document.querySelectorAll(".round").forEach(r=>r.innerHTML="")

round1.forEach((m,i)=>{

const p = percent(m.votes1,m.votes2)

if(i<4){

document.getElementById("r1l")
.appendChild(createBox(getName(m.player1_id),p[0],m.id))

document.getElementById("r1l")
.appendChild(createBox(getName(m.player2_id),p[1],m.id))

}else{

document.getElementById("r1r")
.appendChild(createBox(getName(m.player1_id),p[0],m.id))

document.getElementById("r1r")
.appendChild(createBox(getName(m.player2_id),p[1],m.id))

}

})

}

loadBracket()

</script>

</body>
</html>
