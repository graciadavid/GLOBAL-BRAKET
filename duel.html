<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Vote</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:60px;
}

button{
padding:20px 40px;

}

</style>

</head>

<body>

<h1>Vote</h1>

<h2 id="teamA"></h2>
<button id="btnA">Vote</button>

<h2 id="teamB"></h2>
<button id="btnB">Vote</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabase = window.supabase.createClient(
"https://okaprbdbtnyiutztibcs.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rYXByYmRidG55aXV0enRpYmNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMDgyNjgsImV4cCI6MjA4ODg4NDI2OH0.8tfmypajrsLVbrD3-PUwkJvrM1h9aQ8UN2IP3btoNLE"
)

const params = new URLSearchParams(window.location.search)
const match = params.get("match")

const teams = {
"madrid-barcelona":["Madrid","Barcelona"],
"paris-rome":["Paris","Rome"],
"london-berlin":["London","Berlin"],
"lisbon-amsterdam":["Lisbon","Amsterdam"],
"prague-vienna":["Prague","Vienna"],
"budapest-dublin":["Budapest","Dublin"],
"copenhagen-florence":["Copenhagen","Florence"],
"seville-milan":["Seville","Milan"]
}

const teamA = teams[match][0]
const teamB = teams[match][1]

document.getElementById("teamA").innerText = teamA
document.getElementById("teamB").innerText = teamB

document.getElementById("btnA").onclick = () => vote(teamA)
document.getElementById("btnB").onclick = () => vote(teamB)

async function vote(team){

const { error } = await supabase
.from("votes")
.insert({
match: match,
choice: team.toLowerCase()
})

if(error){

alert("Error saving vote")

}else{

alert("Vote registered!")

}

}

</script>

</body>
</html>
