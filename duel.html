<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Duel</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#3c3ccf,#000);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
text-align:center;
}

.title{
font-size:48px;
margin-bottom:50px;
}

.duel{
display:flex;
gap:120px;
align-items:center;
justify-content:center;
}

.player{
background:white;
color:black;
padding:30px 60px;
border-radius:14px;
font-size:26px;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

.player:hover{
transform:scale(1.06);
}

.percent{
margin-top:12px;
font-size:18px;
}

.vs{
font-size:32px;
}

.message{
margin-top:30px;
font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<div class="title" id="title">Loading...</div>

<div class="duel">

<div>
<div class="player" id="p1">...</div>
<div class="percent" id="percent1"></div>
</div>

<div class="vs">VS</div>

<div>
<div class="player" id="p2">...</div>
<div class="percent" id="percent2"></div>
</div>

</div>

<div class="message" id="message"></div>

</div>

<script>

/* SUPABASE */

const { createClient } = supabase

const supabaseClient = createClient(
"https://okaprbdbtnyiutztibcs.supabase.co",
"TU_ANON_PUBLIC_KEY"
)

/* SESSION */

let session_id = localStorage.getItem("session_id")

if(!session_id){
session_id = crypto.randomUUID()
localStorage.setItem("session_id",session_id)
}

/* EXTRAER MATCH ID DE LA URL SEO */

const path = window.location.pathname

const slug = path.split("/").pop()

const match_id = slug.split("-").pop()

/* CARGAR MATCH */

async function loadMatch(){

const { data:match } = await supabaseClient
.from("matches")
.select("*")
.eq("id",match_id)
.single()

const { data:p1 } = await supabaseClient
.from("participants")
.select("name")
.eq("id",match.player1_id)
.single()

const { data:p2 } = await supabaseClient
.from("participants")
.select("name")
.eq("id",match.player2_id)
.single()

document.getElementById("title").innerText = p1.name + " vs " + p2.name

document.getElementById("p1").innerText = p1.name
document.getElementById("p2").innerText = p2.name

updatePercent(match.votes1, match.votes2)

}

/* PORCENTAJE */

function updatePercent(v1,v2){

const total = v1 + v2

const p1 = Math.round(v1/total*100)
const p2 = Math.round(v2/total*100)

document.getElementById("percent1").innerText = p1 + "%"
document.getElementById("percent2").innerText = p2 + "%"

}

/* VOTAR */

async function vote(player){

const { data:existing } = await supabaseClient
.from("votes")
.select("*")
.eq("session_id",session_id)
.eq("match_id",match_id)

if(existing.length > 0){

document.getElementById("message").innerText = "You already voted in this duel"

return

}

await supabaseClient
.from("votes")
.insert({

match_id:match_id,
session_id:session_id,
player_id:player

})

const { data:match } = await supabaseClient
.from("matches")
.select("*")
.eq("id",match_id)
.single()

if(player == 1){
match.votes1++
await supabaseClient.from("matches").update({votes1:match.votes1}).eq("id",match_id)
}

if(player == 2){
match.votes2++
await supabaseClient.from("matches").update({votes2:match.votes2}).eq("id",match_id)
}

updatePercent(match.votes1, match.votes2)

document.getElementById("message").innerText = "Vote recorded!"

}

/* EVENTOS */

document.getElementById("p1").onclick = () => vote(1)
document.getElementById("p2").onclick = () => vote(2)

/* INIT */

loadMatch()

</script>

</body>
</html>
