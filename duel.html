<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Duel</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#3c3ccf,#000);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
text-align:center;
}

.title{
font-size:36px;
margin-bottom:40px;
}

.duel{
display:flex;
gap:80px;
align-items:center;
justify-content:center;
}

.player{

background:white;
color:black;

padding:30px 40px;

border-radius:12px;

font-size:22px;
font-weight:bold;

cursor:pointer;

transition:transform .2s;

}

.player:hover{
transform:scale(1.05);
}

.vs{
font-size:30px;
}

.percent{
margin-top:10px;
font-size:16px;
}

.message{
margin-top:30px;
font-size:18px;
}

.back{
margin-top:40px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<div class="title" id="title"></div>

<div class="duel">

<div>
<div class="player" id="p1"></div>
<div class="percent" id="percent1"></div>
</div>

<div class="vs">VS</div>

<div>
<div class="player" id="p2"></div>
<div class="percent" id="percent2"></div>
</div>

</div>

<div class="message" id="message"></div>

<div class="back" onclick="goBack()">← Back to bracket</div>

</div>

<script>

/* READ URL */

const params = new URLSearchParams(window.location.search)

const name1 = params.get("name1")
const name2 = params.get("name2")

document.getElementById("title").innerText =
name1 + " vs " + name2

document.getElementById("p1").innerText = name1
document.getElementById("p2").innerText = name2

/* MATCH KEY */

const matchKey = name1 + "_vs_" + name2

/* LOAD VOTES */

let votes = JSON.parse(localStorage.getItem(matchKey)) || {
v1:1,
v2:1
}

/* CHECK IF USER ALREADY VOTED */

const voted = localStorage.getItem("voted_"+matchKey)

/* UPDATE PERCENTAGES */

function updatePercent(){

let total = votes.v1 + votes.v2

let p1 = Math.round(votes.v1/total*100)
let p2 = Math.round(votes.v2/total*100)

document.getElementById("percent1").innerText = p1+"%"
document.getElementById("percent2").innerText = p2+"%"

}

updatePercent()

/* VOTE */

function vote(choice){

if(voted){

document.getElementById("message").innerText =
"You already voted in this duel"

return
}

if(choice==1) votes.v1++
if(choice==2) votes.v2++

localStorage.setItem(matchKey,JSON.stringify(votes))

localStorage.setItem("voted_"+matchKey,true)

updatePercent()

document.getElementById("message").innerText =
"Vote recorded!"

}

/* CLICK EVENTS */

document.getElementById("p1").onclick = ()=>vote(1)
document.getElementById("p2").onclick = ()=>vote(2)

/* BACK */

function goBack(){
window.history.back()
}

</script>

</body>
</html>
