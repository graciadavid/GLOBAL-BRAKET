<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Vote</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:60px;
}

button{
padding:20px 40px;
font-size:20px;
margin:20px;
cursor:pointer;
border-radius:8px;
border:none;
background:#38bdf8;
color:black;
font-weight:bold;
}

button:hover{
background:#0ea5e9;
}

</style>

</head>

<body>

<h1>Vote</h1>

<h2 id="teamA">Loading...</h2>
<button onclick="vote('A')">Vote</button>

<h2 id="teamB">Loading...</h2>
<button onclick="vote('B')">Vote</button>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabase = window.supabase.createClient(
"https://okaprbdbtnyiutztibcs.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rYXByYmRidG55aXV0enRpYmNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMDgyNjgsImV4cCI6MjA4ODg4NDI2OH0.8tfmypajrsLVbrD3-PUwkJvrM1h9aQ8UN2IP3btoNLE"
)

const params = new URLSearchParams(window.location.search)
const match = params.get("match")

const teams = {
"madrid-barcelona":["Madrid","Barcelona"],
"paris-rome":["Paris","Rome"]
}

if(teams[match]){

document.getElementById("teamA").innerText = teams[match][0]
document.getElementById("teamB").innerText = teams[match][1]

}else{

document.getElementById("teamA").innerText = "Match not found"
document.getElementById("teamB").innerText = ""

}

async function vote(team){

let teamName

if(team === "A"){
teamName = teams[match][0].toLowerCase()
}else{
teamName = teams[match][1].toLowerCase()
}

const { error } = await supabase
.from("votes")
.insert({
match: match,
choice: teamName
})

if(error){

alert("Error saving vote")

}else{

alert("Vote registered!")

}

}

</script>

</body>
</html>
