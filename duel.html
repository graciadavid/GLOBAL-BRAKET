<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Duel</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(#3c3ccf,#000);
color:white;
font-family:Arial;
}

.container{
text-align:center;
}

.player{
background:white;
color:black;
padding:20px;
margin:20px;
border-radius:14px;
cursor:pointer;
font-size:24px;
}

.percent{
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1 id="title">Loading...</h1>

<div id="p1" class="player"></div>
<div id="p2" class="player"></div>

</div>

<script>

const { createClient } = supabase

const supabaseClient = createClient(
"https://okaprbdbtnyiutztibcs.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
)

const params=new URLSearchParams(location.search)
const matchId=params.get("match")

async function load(){

const { data:match } = await supabaseClient
.from("matches")
.select("*")
.eq("id",matchId)
.single()

const { data:p1 } = await supabaseClient
.from("participants")
.select("*")
.eq("id",match.player1_id)
.single()

const { data:p2 } = await supabaseClient
.from("participants")
.select("*")
.eq("id",match.player2_id)
.single()

const v1=match.votes1||1
const v2=match.votes2||1

const total=v1+v2

const pct1=Math.round(v1*100/total)
const pct2=Math.round(v2*100/total)

document.getElementById("title").innerText=`${p1.name} vs ${p2.name}`

document.getElementById("p1").innerHTML=`${p1.name} <span class="percent">${pct1}%</span>`
document.getElementById("p2").innerHTML=`${p2.name} <span class="percent">${pct2}%</span>`

document.getElementById("p1").onclick=()=>vote(match,1)
document.getElementById("p2").onclick=()=>vote(match,2)

}

async function vote(match,player){

let v1=match.votes1||1
let v2=match.votes2||1

if(player===1) v1++
if(player===2) v2++

await supabaseClient
.from("matches")
.update({votes1:v1,votes2:v2})
.eq("id",match.id)

location.reload()

}

load()

</script>

</body>
</html>
