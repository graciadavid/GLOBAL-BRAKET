<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vote</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#3c3ccf,#000);
color:white;
overflow-x:hidden;
}

.title{
text-align:center;
font-size:28px;
padding:10px;
}

.bracket{
display:flex;
justify-content:center;
align-items:center;
width:100vw;
height:90vh;
gap:12px;
transform:scale(0.95);
transform-origin:center;
}

.side{
display:flex;
gap:8px;
}

.round{
display:flex;
flex-direction:column;
gap:6px;
}

.match{
width:95px;
height:20px;
background:linear-gradient(#eee,#bbb);
border-radius:8px;
font-size:10px;
color:black;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
overflow:hidden;
white-space:nowrap;
text-overflow:ellipsis;
}

.match:hover{
background:white;
}

.center{
display:flex;
align-items:center;
padding:0 10px;
}

.champion{
width:110px;
height:24px;
background:linear-gradient(#eee,#bbb);
border-radius:12px;
font-size:11px;
color:black;
display:flex;
align-items:center;
justify-content:center;
}

@media (max-width:1200px){

.bracket{
transform:scale(0.85);
}

}

@media (max-width:900px){

.bracket{
flex-direction:column;
transform:none;
height:auto;
}

}

</style>

</head>

<body>

<div class="container">

<h1>Who do you prefer?</h1>

<div class="vote-area">

<div>
<div id="name1" class="name"></div>
<button onclick="vote(1)">Vote</button>
</div>

<div>
<div id="name2" class="name"></div>
<button onclick="vote(2)">Vote</button>
</div>

</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const name1 = params.get("name1");
const name2 = params.get("name2");

document.getElementById("name1").innerText = name1;
document.getElementById("name2").innerText = name2;

function vote(choice){

if(choice === 1){
alert("You voted for " + name1);
}else{
alert("You voted for " + name2);
}

}

</script>

</body>
</html>
