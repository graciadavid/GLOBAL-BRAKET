<style>

body{

}

h1{
margin-bottom:40px;
}

button{

}

}

</head>

<body>

<h1>Vota tu favorito</h1>

<button id="a">...</button>
<button id="b">...</button>

<script>

const SUPABASE_URL = "https://okaprbbdtnyiutztibcs.supabase.co"
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rYXByYmRidG55aXV0enRpYmNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMDgyNjgsImV4cCI6MjA4ODg4NDI2OH0.8tfmypajrsLVbrD3-PUwkJvrM1h9aQ8UN2IP3btoNLE"

const client = supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

const urlParams = new URLSearchParams(window.location.search)
const matchId = urlParams.get("match")

let participantA
let participantB

async function loadMatch(){

const { data } = await client
.from("matches")
.select("participant_a_id,participant_b_id")
.eq("id",matchId)
.single()

participantA = data.participant_a_id
participantB = data.participant_b_id

const { data:pa } = await client
.from("participants")
.select("name")
.eq("id",participantA)
.single()

const { data:pb } = await client
.from("participants")
.select("name")
.eq("id",participantB)
.single()

document.getElementById("a").innerText = pa.name
document.getElementById("b").innerText = pb.name

}

async function voteA(){

await client.rpc("increment_votes_a",{match_id:matchId})

alert("Voto registrado")

}

async function voteB(){

await client.rpc("increment_votes_b",{match_id:matchId})

alert("Voto registrado")

}

document.getElementById("a").onclick = voteA
document.getElementById("b").onclick = voteB

loadMatch()

</script>

</body>
</html>
