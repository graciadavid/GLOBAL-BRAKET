<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vote</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.team{
background:#1e293b;
padding:20px;
margin:20px;
border-radius:10px;
cursor:pointer;
font-size:20px;
}

.team:hover{
background:#38bdf8;
color:black;
}

button{
margin-top:30px;
padding:10px 20px;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<h1>Vote</h1>

<div id="teams"></div>

<button onclick="goBack()">Back to bracket</button>

<script>

const supabaseClient = window.supabase.createClient(
"https://okaprbdbtnyiutztibcs.supabase.co",
"TU_ANON_KEY"
)

const params = new URLSearchParams(window.location.search)
const matchId = params.get("match_id")

async function loadMatch(){

const {data} = await supabaseClient
.from("matches")
.select("*")
.eq("id",matchId)
.single()

if(!data){

document.body.innerHTML="Match not found"
return

}

if(data.status!=="open"){

document.body.innerHTML="Match closed"
return

}

const teamsDiv=document.getElementById("teams")

teamsDiv.innerHTML=`

<div class="team" onclick="vote('${data.team_a}')">
${data.team_a}
</div>

<div class="team" onclick="vote('${data.team_b}')">
${data.team_b}
</div>

`

}

async function vote(team){

await supabaseClient
.from("votes")
.insert({
match_id:matchId,
choice:team
})

alert("Vote registered")

window.location.href="/"

}

function goBack(){

window.location.href="/"

}

loadMatch()

</script>

</body>
</html>
