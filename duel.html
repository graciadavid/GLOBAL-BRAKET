<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Duel</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#3c3ccf,#000);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
text-align:center;
}

.title{
font-size:40px;
margin-bottom:40px;
}

.duel{
display:flex;
gap:80px;
align-items:center;
justify-content:center;
}

.player{
background:white;
color:black;
padding:30px 50px;
border-radius:12px;
font-size:24px;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

.player:hover{
transform:scale(1.05);
}

.percent{
margin-top:10px;
font-size:18px;
}

.vs{
font-size:28px;
}

.message{
margin-top:30px;
font-size:18px;
}

</style>
</head>

<body>

<div class="container">

<div class="title" id="title">Loading...</div>

<div class="duel">

<div>
<div class="player" id="p1">...</div>
<div class="percent" id="percent1">50%</div>
</div>

<div class="vs">VS</div>

<div>
<div class="player" id="p2">...</div>
<div class="percent" id="percent2">50%</div>
</div>

</div>

<div class="message" id="message"></div>

</div>

<script>

/* SUPABASE */

const supabase = window.supabase.createClient(
"https://okaprbdbtnyiutztibcs.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rYXByYmRidG55aXV0enRpYmNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMDgyNjgsImV4cCI6MjA4ODg4NDI2OH0.8tfmypajrsLVbrD3-PUwkJvrM1h9aQ8UN2IP3btoNLE"
)

/* SESSION */

let session_id = localStorage.getItem("session_id")

if(!session_id){

session_id = crypto.randomUUID()
localStorage.setItem("session_id",session_id)

}

/* READ URL PARAMETERS */

const params = new URLSearchParams(window.location.search)

const name1 = params.get("name1")
const name2 = params.get("name2")

/* SET NAMES */

document.getElementById("title").innerText = name1 + " vs " + name2

document.getElementById("p1").innerText = name1
document.getElementById("p2").innerText = name2

/* VOTES LOCAL DISPLAY */

let v1 = 1
let v2 = 1

function updatePercent(){

let total = v1 + v2

let p1 = Math.round(v1/total*100)
let p2 = Math.round(v2/total*100)

document.getElementById("percent1").innerText = p1+"%"
document.getElementById("percent2").innerText = p2+"%"

}

updatePercent()

/* VOTE */

async function vote(player){

const { data:existing } = await supabase
.from("votes")
.select("*")
.eq("session_id",session_id)
.limit(1)

if(existing && existing.length>0){

document.getElementById("message").innerText =
"You already voted"

return
}

await supabase
.from("votes")
.insert({

match_id:1,
session_id:session_id,
player_id:player

})

if(player==1) v1++
if(player==2) v2++

updatePercent()

document.getElementById("message").innerText =
"Vote recorded!"

}

/* CLICK EVENTS */

document.getElementById("p1").onclick = ()=>vote(1)
document.getElementById("p2").onclick = ()=>vote(2)

</script>

</body>
</html>
