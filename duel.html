<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vote</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#3c3ccf,#000);
color:white;
overflow-x:hidden;
}

.title{
text-align:center;
font-size:30px;
padding:15px;
}

.bracket{
display:flex;
justify-content:center;
align-items:center;
max-width:1200px;
margin:auto;
height:85vh;
gap:20px;
}

.side{
display:flex;
gap:10px;
}

.round{
display:flex;
flex-direction:column;
justify-content:space-around;
height:70vh;
}

.match{
width:110px;
height:22px;
line-height:22px;
background:linear-gradient(#eee,#bbb);
border-radius:10px;
margin:4px 0;
text-align:center;
font-size:11px;
color:black;
cursor:pointer;
overflow:hidden;
white-space:nowrap;
text-overflow:ellipsis;
}

.match:hover{
background:white;
}

.center{
display:flex;
align-items:center;
}

.champion{
width:120px;
height:26px;
line-height:26px;
background:linear-gradient(#eee,#bbb);
border-radius:15px;
text-align:center;
color:black;
font-size:12px;
}

</style>

</head>

<body>

<div class="container">

<h1>Who do you prefer?</h1>

<div class="vote-area">

<div>
<div id="name1" class="name"></div>
<button onclick="vote(1)">Vote</button>
</div>

<div>
<div id="name2" class="name"></div>
<button onclick="vote(2)">Vote</button>
</div>

</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const name1 = params.get("name1");
const name2 = params.get("name2");

document.getElementById("name1").innerText = name1;
document.getElementById("name2").innerText = name2;

function vote(choice){

if(choice === 1){
alert("You voted for " + name1);
}else{
alert("You voted for " + name2);
}

}

</script>

</body>
</html>
