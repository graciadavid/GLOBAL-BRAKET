<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Best Male Name</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#3c3ccf,#000);
color:white;
overflow-x:hidden;
}

.title{
text-align:center;
font-size:28px;
padding:15px;
letter-spacing:2px;
}

.bracket{
display:flex;
justify-content:center;
align-items:center;
width:100%;
height:88vh;
gap:14px;
}

.side{
display:flex;
gap:10px;
}

.round{
display:flex;
flex-direction:column;
gap:6px;
}

.match{
width:95px;
height:22px;
background:linear-gradient(#eee,#bbb);
border-radius:8px;
font-size:11px;
color:black;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
overflow:hidden;
white-space:nowrap;
text-overflow:ellipsis;
}

.match:hover{
background:white;
}

.center{
display:flex;
align-items:center;
padding:0 10px;
}

.champion{
width:110px;
height:26px;
background:linear-gradient(#eee,#bbb);
border-radius:14px;
font-size:12px;
color:black;
display:flex;
align-items:center;
justify-content:center;
}

@media (max-width:1200px){

.bracket{
transform:scale(0.9);
}

}

@media (max-width:900px){

.bracket{
flex-direction:column;
transform:none;
height:auto;
}

.side{
flex-direction:column;
}

}

</style>
</head>

<body>

<div class="title">BEST MALE NAME</div>

<div class="bracket">

<!-- LEFT SIDE -->

<div class="side">

<div class="round">

<div class="match" onclick="openDuel('Alejandro','Daniel')">Alejandro vs Daniel</div>
<div class="match" onclick="openDuel('Mateo','Lucas')">Mateo vs Lucas</div>
<div class="match" onclick="openDuel('Hugo','Adrian')">Hugo vs Adrian</div>
<div class="match" onclick="openDuel('Pablo','Bruno')">Pablo vs Bruno</div>
<div class="match" onclick="openDuel('Diego','Javier')">Diego vs Javier</div>
<div class="match" onclick="openDuel('Carlos','Alvaro')">Carlos vs Alvaro</div>
<div class="match" onclick="openDuel('Marco','Nicolas')">Marco vs Nicolas</div>
<div class="match" onclick="openDuel('Ivan','Sergio')">Ivan vs Sergio</div>

</div>

<div class="round">
<div class="match"></div>
<div class="match"></div>
<div class="match"></div>
<div class="match"></div>
</div>

<div class="round">
<div class="match"></div>
<div class="match"></div>
</div>

<div class="round">
<div class="match"></div>
</div>

</div>


<!-- CENTER -->

<div class="center">
<div class="champion">Champion</div>
</div>


<!-- RIGHT SIDE -->

<div class="side">

<div class="round">
<div class="match"></div>
</div>

<div class="round">
<div class="match"></div>
<div class="match"></div>
</div>

<div class="round">
<div class="match"></div>
<div class="match"></div>
<div class="match"></div>
<div class="match"></div>
</div>

<div class="round">

<div class="match" onclick="openDuel('Gabriel','Leo')">Gabriel vs Leo</div>
<div class="match" onclick="openDuel('Mario','Andres')">Mario vs Andres</div>
<div class="match" onclick="openDuel('David','Eric')">David vs Eric</div>
<div class="match" onclick="openDuel('Oscar','Raul')">Oscar vs Raul</div>
<div class="match" onclick="openDuel('Martin','Joel')">Martin vs Joel</div>
<div class="match" onclick="openDuel('Samuel','Enzo')">Samuel vs Enzo</div>
<div class="match" onclick="openDuel('Tomas','Gonzalo')">Tomas vs Gonzalo</div>
<div class="match" onclick="openDuel('Luis','Ruben')">Luis vs Ruben</div>

</div>

</div>

</div>


<script>

function openDuel(name1,name2){

window.location.href =
"duel.html?name1="+encodeURIComponent(name1)+"&name2="+encodeURIComponent(name2);

}

</script>

</body>

</html>
