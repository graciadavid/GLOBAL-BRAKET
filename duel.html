<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duel</title>
  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(180deg,#3c3ccf 0%, #111 100%);
      color:white;
      padding:20px;
    }

    .card{
      width:min(700px, 100%);
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.18);
      border-radius:24px;
      padding:30px;
      text-align:center;
      backdrop-filter:blur(8px);
    }

    h1{
      margin-top:0;
      font-size:40px;
      font-weight:300;
    }

    .competition{
      color:#d8d8ff;
      margin-bottom:24px;
    }

    .players{
      display:grid;
      grid-template-columns:1fr auto 1fr;
      gap:20px;
      align-items:center;
      margin-top:20px;
    }

    .player{
      background:white;
      color:#111;
      border-radius:16px;
      padding:30px 20px;
      font-size:28px;
      font-weight:700;
      cursor:pointer;
      transition:transform .15s ease;
    }

    .player:hover{
      transform:translateY(-3px);
    }

    .vs{
      font-size:32px;
      font-weight:700;
    }

    .back{
      margin-top:30px;
      background:gold;
      color:#111;
      border:none;
      border-radius:999px;
      padding:12px 20px;
      font-weight:700;
      cursor:pointer;
    }

    @media (max-width: 700px){
      .players{
        grid-template-columns:1fr;
      }

      .vs{
        display:none;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>DUEL</h1>
    <div class="competition" id="competition"></div>

    <div class="players">
      <div class="player" id="p1"></div>
      <div class="vs">VS</div>
      <div class="player" id="p2"></div>
    </div>

    <button class="back" onclick="goBack()">← Back to bracket</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const competition = params.get("competition") || "names";
    const name1 = decodeURIComponent(params.get("name1") || "");
    const name2 = decodeURIComponent(params.get("name2") || "");

    document.getElementById("competition").textContent = "Competition: " + competition;
    document.getElementById("p1").textContent = name1;
    document.getElementById("p2").textContent = name2;

    function goBack(){
      window.location.href = "bracket.html?competition=" + encodeURIComponent(competition);
    }
  </script>
</body>
</html>
